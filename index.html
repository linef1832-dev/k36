    <script>
        function toggleSubMenu(menuId, iconId) {
            const menu = document.getElementById(menuId);
            const icon = document.getElementById(iconId);
            if(menu.classList.contains('hidden')) {
                menu.classList.remove('hidden'); menu.classList.add('flex');
                icon.style.transform = 'rotate(90deg)';
            } else {
                menu.classList.add('hidden'); menu.classList.remove('flex');
                icon.style.transform = 'rotate(0deg)';
            }
        }
    </script>

    <div id="editUserModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(0,0,0,.65);align-items:center;justify-content:center;padding:1rem;" onclick="if(event.target===this)window.closeEditUserModal()">
        <div style="width:100%;max-width:360px;background:#0f172a;border-radius:16px;border:1px solid #1e293b;overflow:hidden;" onclick="event.stopPropagation()">

            <div style="padding:16px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1e293b;">
                <div style="width:32px;height:32px;border-radius:9px;background:#3b0764;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <span class="material-icons" style="font-size:15px;color:#a78bfa;">edit</span>
                </div>
                <div>
                    <div style="font-weight:700;font-size:13px;color:#f1f5f9;line-height:1.3;">แก้ไขข้อมูลพนักงาน</div>
                    <div style="font-size:11px;color:#475569;margin-top:1px;">อัปเดตชื่อและ ID การเชื่อมต่อ</div>
                </div>
            </div>

            <div style="padding:20px;display:flex;flex-direction:column;gap:16px;">
                <input type="hidden" id="editUserId">
                <div style="display:flex;flex-direction:column;gap:6px;">
                    <label style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#64748b;display:flex;align-items:center;gap:6px;">
                        <span class="material-icons" style="font-size:12px;">person</span> ชื่อพนักงาน
                    </label>
                    <input id="editUserName" type="text"
                        style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:10px;border:1.5px solid #1e293b;background:#020617;color:#e2e8f0;font-size:13px;outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s;"
                        onfocus="this.style.borderColor='#8b5cf6';this.style.boxShadow='0 0 0 4px rgba(139,92,246,.12)'"
                        onblur="this.style.borderColor='#1e293b';this.style.boxShadow='none'"
                        onmouseenter="if(document.activeElement!==this)this.style.borderColor='#334155'"
                        onmouseleave="if(document.activeElement!==this)this.style.borderColor='#1e293b'">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px;">
                    <label style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#a78bfa;display:flex;align-items:center;gap:6px;">
                        <span style="background:#3b0764;color:#c084fc;border:1px solid rgba(139,92,246,.3);padding:2px 5px;border-radius:4px;font-size:8.5px;font-weight:800;letter-spacing:.6px;">DIS</span>
                        Discord ID
                    </label>
                    <input id="editDiscordId" type="text" placeholder="เช่น 937663612766548028"
                        style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:10px;border:1.5px solid #1e293b;background:#020617;color:#c084fc;font-family:monospace;font-size:11.5px;letter-spacing:.3px;outline:none;transition:border-color .2s,box-shadow .2s;"
                        onfocus="this.style.borderColor='#8b5cf6';this.style.boxShadow='0 0 0 4px rgba(192,132,252,.12)'"
                        onblur="this.style.borderColor='#1e293b';this.style.boxShadow='none'"
                        onmouseenter="if(document.activeElement!==this)this.style.borderColor='#334155'"
                        onmouseleave="if(document.activeElement!==this)this.style.borderColor='#1e293b'">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px;">
                    <label style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#7dd3fc;display:flex;align-items:center;gap:6px;">
                        <span style="background:#082f49;color:#38bdf8;border:1px solid rgba(14,165,233,.3);padding:2px 5px;border-radius:4px;font-size:8.5px;font-weight:800;letter-spacing:.6px;">TEL</span>
                        Telegram ID
                    </label>
                    <input id="editTelegramId" type="text" placeholder="เช่น 8046888446"
                        style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:10px;border:1.5px solid #1e293b;background:#020617;color:#38bdf8;font-family:monospace;font-size:11.5px;letter-spacing:.3px;outline:none;transition:border-color .2s,box-shadow .2s;"
                        onfocus="this.style.borderColor='#0ea5e9';this.style.boxShadow='0 0 0 4px rgba(56,189,248,.12)'"
                        onblur="this.style.borderColor='#1e293b';this.style.boxShadow='none'"
                        onmouseenter="if(document.activeElement!==this)this.style.borderColor='#334155'"
                        onmouseleave="if(document.activeElement!==this)this.style.borderColor='#1e293b'">
                </div>

                <div style="display:flex;flex-direction:column;gap:6px;">
                    <label style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#94a3b8;">TAG</label>
                    <select id="editTag"
                        style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:10px;border:1.5px solid #1e293b;background:#020617;color:#f1f5f9;font-size:13px;font-weight:600;outline:none;transition:border-color .2s;"
                        onfocus="this.style.borderColor='#7c3aed'" onblur="this.style.borderColor='#1e293b'">
                        <option value="">— ไม่ระบุ —</option>
                        <option value="AM" style="color:#60a5fa;">AM</option>
                        <option value="AMOL" style="color:#4ade80;">AMOL</option>
                        <option value="OD" style="color:#e879f9;">OD</option>
                        <option value="ODOL" style="color:#fb923c;">ODOL</option>
                    </select>
                </div>
            </div>

            <div style="padding:16px 20px;display:flex;gap:10px;border-top:1px solid #1e293b;">

                    onmouseenter="this.style.borderColor='#ef4444';this.style.background='rgba(239,68,68,.1)';this.style.color='#f87171'"
                    onmouseleave="this.style.borderColor='#1e293b';this.style.background='transparent';this.style.color='#64748b'">

                    onmouseenter="this.style.background='#6d28d9'"
                    onmouseleave="this.style.background='#7c3aed'"

                    onmouseup="this.style.transform='scale(1)'">
                    <span class="material-icons" style="font-size:15px;">save</span> บันทึก
