<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการ Platinum Plus VIP</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { slate: { 850: '#151f32' } } } } }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    
    <script>
        function toggleSubMenu(menuId, iconId) {
            const menu = document.getElementById(menuId);
            const icon = document.getElementById(iconId);
            if(menu.classList.contains('hidden')) {
                menu.classList.remove('hidden'); menu.classList.add('flex');
                icon.style.transform = 'rotate(90deg)';
            } else {
                menu.classList.add('hidden'); menu.classList.remove('flex');
                icon.style.transform = 'rotate(0deg)';
            }
        }
    </script>
</head>
<body class="bg-gray-100 text-slate-800 dark:bg-[#0b1120] dark:text-gray-100 transition-colors duration-300">

    <div id="loading" class="fixed inset-0 bg-white/95 dark:bg-slate-900/95 z-50 flex flex-col items-center justify-center p-4">
        <div class="animate-spin h-14 w-14 border-4 border-blue-600 rounded-full border-t-transparent mb-4"></div>
        <p class="text-xl font-bold text-gray-600 dark:text-gray-300">กำลังเชื่อมต่อระบบ...</p>
    </div>

    <div id="login-container"></div>

    <div id="main-layout" class="w-full mx-auto p-2 md:p-4 hidden fade-in min-h-screen">
        <div class="flex flex-col md:flex-row gap-4 md:gap-6 h-full items-start">

            <div class="w-full md:w-[260px] bg-[#0b1727] rounded-xl shadow-2xl border border-[#1a273a] flex flex-col shrink-0 sticky top-4 h-[calc(100vh-2rem)] overflow-y-auto custom-scrollbar z-40">
                <div class="p-5 border-b border-[#1a273a] text-center bg-[#020813] sticky top-0 z-10 overflow-hidden relative">
                    <div class="absolute inset-0 bg-yellow-500/10 blur-[30px] rounded-full pointer-events-none"></div>
                    <h2 class="font-black text-2xl tracking-[0.15em] flex items-center justify-center gap-2 relative z-10">
                        <span class="material-icons text-yellow-400 drop-shadow-[0_0_12px_rgba(250,204,21,0.8)] text-3xl">admin_panel_settings</span> 
                        <div class="flex items-center gap-1.5">
                            <span class="text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,1)]">OK</span>
                            <span class="text-white drop-shadow-[0_0_12px_rgba(255,255,255,0.9)]">VIP</span>
                        </div>
                    </h2>
                </div>

                <div class="flex flex-col py-2" id="menu-list">
                    <button onclick="showPage('dashboard')" class="nm-menu-title active border-b border-[#1a273a]">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-blue-400">home</span> หน้าหลักลงเวลา</div>
                    </button>
                    <button onclick="showPage('leave')" class="nm-menu-title border-b border-[#1a273a]">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-rose-500">event_busy</span> วันหยุด / ลางาน</div>
                    </button>
                    <button onclick="showPage('gallery')" class="nm-menu-title border-b border-[#1a273a]">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-pink-500">photo_library</span> คลังรูปภาพ</div>
                    </button>
                    <button onclick="showPage('password')" class="nm-menu-title border-b border-[#1a273a]">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-yellow-500">vpn_key</span> รหัสผ่าน</div>
                    </button>
                    <button onclick="showPage('sheet')" class="nm-menu-title border-b border-[#1a273a]">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-green-500">table_view</span> ตารางงาน (Sheets)</div>
                    </button>
                    <button onclick="showPage('swap')" class="nm-menu-title border-b border-[#1a273a]">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-orange-500">swap_horiz</span> สลับกะการทำงาน</div>
                    </button>
                    <button onclick="showPage('duty')" class="nm-menu-title border-b border-[#1a273a]">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-indigo-400">assignment_ind</span> จัดหน้าที่ / เวร</div>
                    </button>
                    <button onclick="showPage('telegram')" class="nm-menu-title border-b border-[#1a273a]">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-sky-400">near_me</span> กลุ่มงาน (Telegram)</div>
                    </button>
                    <button onclick="showPage('files')" class="nm-menu-title border-b border-[#1a273a]">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-emerald-400">folder_zip</span> คลังไฟล์ / โปรแกรม</div>
                    </button>
                    <button onclick="showPage('summary')" class="nm-menu-title border-b border-[#1a273a]">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-purple-400">query_stats</span> สรุปยอดทำรายการ</div>
                    </button>
                    <button onclick="showPage('announcement')" class="nm-menu-title border-b border-[#1a273a]">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-orange-500">campaign</span> กระดานประกาศ</div>
                    </button>
                    <button id="sidebarKbizMenu" onclick="showPage('kbiz')" class="hidden nm-menu-title border-b border-[#1a273a]">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-teal-400">smart_toy</span> จัดการบอท K BIZ</div>
                    </button>

                    <button onclick="toggleSubMenu('menu-discord', 'icon-discord')" class="nm-menu-title border-b border-[#1a273a] justify-between">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-indigo-500">discord</span> เครื่องมือ DISCORD</div>
                        <span class="material-icons text-sm transition-transform duration-200" id="icon-discord">chevron_right</span>
                    </button>
                    <div id="menu-discord" class="hidden flex-col bg-[#020813] shadow-inner">
                        <button onclick="showPage('discord')" class="w-full text-left py-3 pl-12 pr-4 text-sm text-gray-400 hover:text-white hover:bg-[#0a192f] transition border-b border-[#1a273a]/50">เปิดหน้าต่างระบบ</button>
                    </div>

                    <button onclick="toggleSubMenu('menu-admin', 'icon-admin')" class="nm-menu-title border-b border-[#1a273a] justify-between">
                        <div class="flex items-center"><span class="material-icons nm-menu-icon text-yellow-500">manage_accounts</span> เครื่องมือผู้จัดการ</div>
                        <span class="material-icons text-sm transition-transform duration-200" id="icon-admin">chevron_right</span>
                    </button>
                    <div id="menu-admin" class="hidden flex-col bg-[#020813] shadow-inner">
                        <button onclick="openAdminPanel()" class="w-full text-left py-3 pl-12 pr-4 text-sm text-gray-400 hover:text-white hover:bg-[#0a192f] transition border-b border-[#1a273a]/50">ตั้งค่าระบบ (สลับหน้า)</button>
                    </div>
                </div> 

                <div class="mt-auto border-t border-[#1a273a] bg-[#020813] sticky bottom-0 z-10 p-5">
                    
                    <button onclick="openLogsPage()" class="flex items-center w-full px-2 py-2 mb-4 hover:bg-blue-900/40 text-blue-400 transition rounded-lg text-left cursor-pointer border border-transparent hover:border-blue-900/50">
                        <span class="material-icons mr-3 text-[18px]">history</span> <span class="text-sm font-bold flex-1">ประวัติระบบ</span>
                    </button>

                    <div class="flex items-center justify-between mb-4 px-2">
                        <div class="flex items-center text-[#8b9bb4] text-sm font-bold">
                            <span id="themeIcon" class="material-icons text-yellow-500 mr-3 text-[18px]">dark_mode</span> โหมดสี
                        </div>
                        <label class="theme-switch">
                            <input type="checkbox" id="themeToggleCb" onchange="toggleTheme()" checked>
                            <span class="theme-slider"></span>
                        </label>
                    </div>
                    
                    <button onclick="logout()" class="flex items-center w-full px-2 py-2 hover:bg-red-900/40 text-red-500 transition rounded-lg text-left cursor-pointer border border-transparent hover:border-red-900/50">
                        <span class="material-icons mr-3 text-[18px]">logout</span> <span class="text-sm font-bold flex-1">ออกจากระบบ</span>
                    </button>
                </div>

            </div> <div id="app-content" class="flex-1 w-full min-w-0 pb-10 relative"></div>

        </div>
    </div>

    <script src="./js/global.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/system_core.js"></script>
    <script src="./js/dashboard.js"></script>
    
    <script src="./js/leave.js"></script>
    <script src="./js/duty.js"></script>
    <script src="./js/discord.js"></script>
    <script src="./js/summary.js"></script>

    <script src="./js/Telegram.js"></script>
    <script src="./js/Password.js"></script>
    <script src="./js/FilesApp.js"></script>
    <script src="./js/sheet.js"></script>
    <script src="./js/kbiz.js"></script>
    <script src="./js/gallery.js"></script>
    <script src="./js/swap.js"></script>
</body>
</html>
