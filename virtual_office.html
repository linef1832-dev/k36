<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Virtual Office Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div class="mb-4 text-center">
        <h1 class="text-2xl font-black text-emerald-400">🏢 ออฟฟิศจำลอง (Virtual Office)</h1>
        <p class="text-gray-400 text-sm">กดปุ่มลูกศร ⬅️ ⬆️ ⬇️ ➡️ บนคีย์บอร์ดเพื่อเดิน</p>
    </div>

    <!-- พื้นที่สำหรับวาดแผนที่และตัวละคร -->
    <canvas id="officeCanvas" width="800" height="500" class="bg-slate-800 border-2 border-slate-600 rounded-xl shadow-2xl"></canvas>

    <script>
        const canvas = document.getElementById('officeCanvas');
        const ctx = canvas.getContext('2d');

        // 1. กำหนดข้อมูลตัวละครของเรา และจำลองเพื่อนร่วมงาน
        let myId = 'user_1';
        let players = {
            'user_1': { x: 400, y: 400, color: '#3b82f6', name: 'คุณ (กำลังเดิน)', isMe: true },
            'user_2': { x: 250, y: 150, color: '#f43f5e', name: 'สมชาย (AM)', isMe: false },
            'user_3': { x: 550, y: 150, color: '#10b981', name: 'สมหญิง (OD)', isMe: false }
        };

        // 2. โซนโต๊ะทำงานต่างๆ (จำลองสิ่งกีดขวาง/ฉาก)
        const desks = [
            { x: 200, y: 100, w: 100, h: 60, label: 'โต๊ะ AM', color: '#1e293b' },
            { x: 500, y: 100, w: 100, h: 60, label: 'โต๊ะ OD', color: '#1e293b' },
            { x: 350, y: 50,  w: 100, h: 60, label: 'ห้องผู้จัดการ', color: '#334155' }
        ];

        const speed = 5; // ความเร็วในการเดิน

        // 3. ฟังก์ชันสำหรับวาดทุกอย่างบนหน้าจอ (ทำงานวนซ้ำๆ 60 รอบต่อวินาที)
        function draw() {
            // ล้างหน้าจอเก่าออกก่อนวาดใหม่
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // วาดโต๊ะทำงาน (ฉากหลัง)
            desks.forEach(desk => {
                ctx.fillStyle = desk.color;
                ctx.fillRect(desk.x, desk.y, desk.w, desk.h);
                ctx.fillStyle = '#94a3b8';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(desk.label, desk.x + desk.w/2, desk.y + desk.h/2 + 5);
            });

            // วาดตัวละคร (Avatar)
            for (let id in players) {
                let p = players[id];
                
                // วาดตัวคน (วงกลม)
                ctx.beginPath();
                ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = p.isMe ? '#ffffff' : '#000000';
                ctx.stroke();

                // วาดชื่อบนหัว
                ctx.fillStyle = p.isMe ? '#60a5fa' : '#cbd5e1';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(p.name, p.x, p.y - 25);
            }

            // สั่งให้เบราว์เซอร์เรียกใช้ฟังก์ชัน draw() วนไปเรื่อยๆ (Animation Loop)
            requestAnimationFrame(draw);
        }

        // 4. ดักจับการกดปุ่มคีย์บอร์ดเพื่อเดิน
        window.addEventListener('keydown', (e) => {
            let me = players[myId];
            if (!me) return;

            if (e.key === 'ArrowUp') me.y -= speed;
            if (e.key === 'ArrowDown') me.y += speed;
            if (e.key === 'ArrowLeft') me.x -= speed;
            if (e.key === 'ArrowRight') me.x += speed;

            // ป้องกันเดินทะลุกำแพง (ขอบจอ)
            if(me.x < 15) me.x = 15;
            if(me.x > canvas.width - 15) me.x = canvas.width - 15;
            if(me.y < 15) me.y = 15;
            if(me.y > canvas.height - 15) me.y = canvas.height - 15;

            // 🌟 จุดเชื่อมต่อระบบ Real-time (Supabase)
            // เมื่อเดินปุ๊บ เราจะสั่ง Broadcast ตำแหน่งใหม่ ไปให้คนอื่นในออฟฟิศเห็น
            /*
            appDB.channel('virtual-office').send({
                type: 'broadcast',
                event: 'move',
                payload: { id: myId, x: me.x, y: me.y }
            });
            */
        });

        // เริ่มต้นการวาดครั้งแรก
        draw();
    </script>
</body>
</html>
