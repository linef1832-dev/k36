<style>
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes spin-slow{to{transform:rotate(360deg)}}
@keyframes spin-rev{to{transform:rotate(-360deg)}}
@keyframes pulse-ring{0%{transform:scale(0.9);opacity:0.7}100%{transform:scale(1.5);opacity:0}}
@keyframes slide-up{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes twinkle{0%,100%{opacity:0.15}50%{opacity:1}}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-10px)}}
@keyframes aurora{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes meteor{0%{transform:translateX(0) translateY(0) rotate(-45deg);opacity:1}100%{transform:translateX(-600px) translateY(600px) rotate(-45deg);opacity:0}}
@keyframes orbit{from{transform:rotate(0deg) translateX(55px) rotate(0deg)}to{transform:rotate(360deg) translateX(55px) rotate(-360deg)}}
@keyframes orbit2{from{transform:rotate(180deg) translateX(80px) rotate(-180deg)}to{transform:rotate(540deg) translateX(80px) rotate(-540deg)}}
@keyframes glow{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(800%)}}

#loginScreen{background:#000308;overflow:hidden}

.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle ease-in-out infinite}
.meteor-line{position:absolute;animation:meteor linear infinite;pointer-events:none;overflow:hidden}
.meteor-line::after{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,rgba(255,255,255,0),#fff 30%,rgba(180,220,255,0.8) 60%,rgba(255,255,255,0));border-radius:99px}

.pin-epic{width:52px;height:60px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);border-radius:14px;color:#fff;font-size:28px;font-weight:900;text-align:center;outline:none;transition:all 0.2s;caret-color:transparent;box-shadow:inset 0 1px 0 rgba(255,255,255,0.06),0 4px 12px rgba(0,0,0,0.4)}
.pin-epic:focus{border-color:rgba(220,0,0,0.9);background:rgba(220,0,0,0.08);box-shadow:0 0 0 3px rgba(220,0,0,0.2),0 0 20px rgba(220,0,0,0.3);transform:translateY(-2px) scale(1.06)}
.login-input{width:100%;padding:14px 14px 14px 48px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:16px;color:#fff;font-weight:700;font-size:15px;outline:none;transition:all 0.25s;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.login-input::placeholder{color:rgba(255,255,255,0.22)}
.login-input:focus{border-color:rgba(220,0,0,0.6);background:rgba(220,0,0,0.05);box-shadow:0 0 0 3px rgba(220,0,0,0.12)}
</style>

<div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center p-4">

    <!-- Deep space base -->
    <div class="absolute inset-0 pointer-events-none" style="background:radial-gradient(ellipse 120% 80% at 50% 0%,#05082a 0%,#020514 40%,#000308 100%)"></div>

    <!-- Aurora bands -->
    <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(180deg,rgba(30,0,80,0.4) 0%,transparent 35%,transparent 65%,rgba(0,20,60,0.3) 100%)"></div>
    <div class="absolute top-0 left-0 right-0 h-64 pointer-events-none" style="background:linear-gradient(135deg,rgba(80,0,180,0.18),rgba(0,80,200,0.12),rgba(120,0,100,0.15),rgba(0,40,120,0.1));background-size:400% 400%;animation:aurora 12s ease infinite;filter:blur(40px)"></div>
    <div class="absolute bottom-0 left-0 right-0 h-48 pointer-events-none" style="background:linear-gradient(315deg,rgba(0,30,100,0.2),rgba(60,0,120,0.15),rgba(0,60,150,0.1));filter:blur(30px)"></div>

    <!-- Star field -->
    <div id="starField" class="absolute inset-0 pointer-events-none"></div>

    <!-- Milky way -->
    <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(100deg,transparent 10%,rgba(160,160,255,0.018) 35%,rgba(200,200,255,0.035) 50%,rgba(160,160,255,0.018) 65%,transparent 90%);filter:blur(3px)"></div>

    <!-- MAIN PLANET — large ringed gas giant -->
    <div class="absolute pointer-events-none" style="width:320px;height:320px;top:-80px;right:-60px">
        <!-- Planet body -->
        <div style="position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 38% 32%,#1e4a9a,#0a1e5c 45%,#040d2e 75%,#020818);box-shadow:0 0 60px rgba(20,60,200,0.25),0 0 120px rgba(10,30,100,0.15),inset -30px -30px 60px rgba(0,0,0,0.6),inset 10px 10px 30px rgba(80,130,255,0.1)"></div>
        <!-- Atmosphere rim -->
        <div style="position:absolute;inset:-2px;border-radius:50%;border:2px solid rgba(80,140,255,0.12);box-shadow:0 0 25px rgba(60,120,255,0.2)"></div>
        <!-- Surface bands -->
        <div style="position:absolute;inset:0;border-radius:50%;overflow:hidden;opacity:0.3">
            <div style="position:absolute;top:28%;left:0;right:0;height:18px;background:rgba(60,100,200,0.4);filter:blur(6px)"></div>
            <div style="position:absolute;top:48%;left:0;right:0;height:10px;background:rgba(40,80,180,0.3);filter:blur(4px)"></div>
            <div style="position:absolute;top:62%;left:0;right:0;height:14px;background:rgba(50,90,190,0.35);filter:blur(5px)"></div>
        </div>
        <!-- Highlight -->
        <div style="position:absolute;inset:0;border-radius:50%;background:linear-gradient(145deg,rgba(120,180,255,0.2) 0%,transparent 45%);pointer-events:none"></div>
        <!-- Ring system -->
        <div style="position:absolute;top:44%;left:-50%;right:-50%;bottom:44%;pointer-events:none">
            <div style="position:absolute;inset:0;border-radius:50%;border:14px solid transparent;border-top:14px solid rgba(100,160,255,0.12);border-bottom:14px solid rgba(100,160,255,0.06);transform:rotateX(72deg) translateY(-2px);filter:blur(1px)"></div>
            <div style="position:absolute;inset:6px;border-radius:50%;border:6px solid transparent;border-top:6px solid rgba(140,200,255,0.18);border-bottom:6px solid rgba(140,200,255,0.08);transform:rotateX(72deg);filter:blur(0.5px)"></div>
        </div>
        <!-- Orbiting moon -->
        <div style="position:absolute;inset:0;border-radius:50%">
            <div style="position:absolute;top:50%;left:50%;width:10px;height:10px;margin:-5px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c8d8ff,#6080c0);box-shadow:0 0 8px rgba(180,210,255,0.8);animation:orbit 10s linear infinite"></div>
            <div style="position:absolute;top:50%;left:50%;width:6px;height:6px;margin:-3px;border-radius:50%;background:#a0b0d0;box-shadow:0 0 5px rgba(160,180,220,0.6);animation:orbit2 16s linear infinite"></div>
        </div>
    </div>

    <!-- Small red planet -->
    <div class="absolute pointer-events-none" style="width:70px;height:70px;bottom:100px;left:80px">
        <div style="position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 35% 30%,#a02000,#500a00 55%,#200400);box-shadow:0 0 25px rgba(160,40,0,0.4),inset -8px -8px 20px rgba(0,0,0,0.5)"></div>
        <div style="position:absolute;inset:0;border-radius:50%;background:linear-gradient(145deg,rgba(255,100,50,0.18) 0%,transparent 50%);border-top:1px solid rgba(255,80,30,0.15)"></div>
        <div style="position:absolute;top:30%;left:20%;width:40%;height:8px;border-radius:4px;background:rgba(60,10,0,0.5);filter:blur(2px)"></div>
    </div>

    <!-- Tiny distant planet -->
    <div class="absolute pointer-events-none" style="width:22px;height:22px;top:22%;left:12%">
        <div style="position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 35% 30%,#004850,#001820);box-shadow:0 0 10px rgba(0,120,140,0.3);opacity:0.75"></div>
    </div>

    <!-- Distant galaxy smudge -->
    <div class="absolute pointer-events-none" style="width:120px;height:60px;top:15%;left:18%;background:radial-gradient(ellipse,rgba(180,150,255,0.06),transparent 70%);border-radius:50%;transform:rotate(-25deg);filter:blur(4px);animation:drift 20s ease-in-out infinite"></div>
    <div class="absolute pointer-events-none" style="width:80px;height:40px;bottom:25%;right:18%;background:radial-gradient(ellipse,rgba(100,180,255,0.05),transparent 70%);border-radius:50%;transform:rotate(15deg);filter:blur(3px);animation:drift 25s ease-in-out infinite reverse"></div>

    <!-- Meteors -->
    <div class="meteor-line" style="width:200px;top:8%;right:15%;animation-duration:5s;animation-delay:0s;opacity:0.7"></div>
    <div class="meteor-line" style="width:120px;top:30%;right:35%;animation-duration:8s;animation-delay:2.5s;opacity:0.45"></div>
    <div class="meteor-line" style="width:180px;top:55%;right:8%;animation-duration:6.5s;animation-delay:4s;opacity:0.55"></div>
    <div class="meteor-line" style="width:90px;top:12%;right:55%;animation-duration:10s;animation-delay:1.5s;opacity:0.35"></div>
    <div class="meteor-line" style="width:140px;top:70%;right:25%;animation-duration:7s;animation-delay:6s;opacity:0.4"></div>

    <!-- Scan line effect on card (subtle) -->

    <!-- ===== CARD ===== -->
    <div class="relative w-full max-w-sm" style="animation:slide-up 0.7s cubic-bezier(0.16,1,0.3,1);z-index:20">

        <!-- Multi-layer glow -->
        <div class="absolute -inset-3 rounded-[2.8rem] pointer-events-none" style="background:radial-gradient(ellipse,rgba(220,0,0,0.15),transparent 70%);filter:blur(20px);animation:glow 4s ease-in-out infinite"></div>
        <div class="absolute -inset-1 rounded-[2.5rem] pointer-events-none" style="background:linear-gradient(135deg,rgba(220,0,0,0.3),rgba(80,0,140,0.2),rgba(0,60,180,0.15),rgba(220,0,0,0.2));filter:blur(10px);animation:glow 3s ease-in-out infinite"></div>
        <div class="absolute -inset-px rounded-[2.5rem] pointer-events-none" style="background:linear-gradient(135deg,rgba(220,0,0,0.45),rgba(100,0,160,0.3),rgba(220,0,0,0.35))"></div>

        <!-- Card -->
        <div class="relative rounded-[2.5rem] overflow-hidden" style="background:linear-gradient(160deg,rgba(8,10,28,0.97),rgba(4,6,18,0.99));border:1px solid rgba(255,255,255,0.07);box-shadow:0 40px 100px rgba(0,0,0,0.85),0 0 0 1px rgba(220,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.06)">

            <!-- Scan line -->
            <div class="absolute left-0 right-0 h-32 pointer-events-none" style="background:linear-gradient(180deg,transparent,rgba(220,0,0,0.025),transparent);animation:scan 8s linear infinite;z-index:1"></div>

            <!-- Top border glow -->
            <div class="absolute top-0 left-8 right-8 h-px" style="background:linear-gradient(90deg,transparent,rgba(220,0,0,0.6),rgba(100,80,255,0.4),rgba(220,0,0,0.6),transparent)"></div>

            <div class="p-8 relative z-10">
                <!-- Header -->
                <div class="text-center mb-7" style="animation:slide-up 0.7s ease-out 0.1s both">

                    <!-- Icon rings -->
                    <div class="relative inline-flex items-center justify-center mb-5" style="width:100px;height:100px">
                        <div class="absolute inset-0 rounded-full" style="border:1px solid rgba(255,255,255,0.05)"></div>
                        <div class="absolute inset-0 rounded-full" style="border:2px solid transparent;border-top-color:rgba(220,0,0,0.9);border-right-color:rgba(220,0,0,0.2);animation:spin-slow 3.5s linear infinite"></div>
                        <div class="absolute inset-0 rounded-full" style="border:1px solid transparent;border-bottom-color:rgba(100,60,255,0.5);border-left-color:rgba(100,60,255,0.2);animation:spin-rev 2.5s linear infinite"></div>
                        <div class="absolute inset-0 rounded-full" style="border:2px solid rgba(220,0,0,0.25);animation:pulse-ring 2s ease-out infinite"></div>
                        <div class="absolute inset-0 rounded-full" style="border:2px solid rgba(220,0,0,0.15);animation:pulse-ring 2s ease-out infinite 0.7s"></div>
                        <div class="relative w-14 h-14 rounded-2xl flex items-center justify-center" style="background:linear-gradient(145deg,#180308,#060012);border:1px solid rgba(220,0,0,0.35);box-shadow:0 0 30px rgba(220,0,0,0.35),0 0 60px rgba(220,0,0,0.1),inset 0 1px 0 rgba(255,100,100,0.08);animation:float 4s ease-in-out infinite">
                            <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
                                <polygon points="6,9 12,3 22,18 12,33 6,27 15,18" fill="#dd0000"/>
                                <polygon points="15,18 22,18 25,23 19,30 12,30" fill="#ff4444" opacity="0.85"/>
                                <polygon points="6,9 12,3 14,7 9,13" fill="#ff2222" opacity="0.5"/>
                            </svg>
                        </div>
                    </div>

                    <div class="font-black flex items-center justify-center gap-1 mb-1.5" style="font-size:36px;letter-spacing:0.15em">
                        <span style="color:#ffffff;text-shadow:0 0 30px rgba(255,255,255,0.25)">PG</span>
                        <span style="color:#dd0000;text-shadow:0 0 20px rgba(220,0,0,1),0 0 40px rgba(220,0,0,0.6),0 0 80px rgba(220,0,0,0.3)">SG</span>
                    </div>

                    <div class="flex items-center justify-center gap-3 mb-2">
                        <div style="height:1px;width:40px;background:linear-gradient(90deg,transparent,rgba(220,0,0,0.4))"></div>
                        <span style="font-size:9px;letter-spacing:0.4em;font-weight:800;color:rgba(180,80,255,0.6)">SECURE SYSTEM</span>
                        <div style="height:1px;width:40px;background:linear-gradient(90deg,rgba(220,0,0,0.4),transparent)"></div>
                    </div>
                    <p style="color:rgba(255,255,255,0.28);font-size:12px;font-weight:500;letter-spacing:0.03em">กรุณายืนยันตัวตนเพื่อเข้าใช้งาน</p>
                </div>

                <!-- Form -->
                <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5" style="animation:slide-up 0.7s ease-out 0.2s both">
                    <div class="relative">
                        <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-[18px]" style="color:rgba(200,0,0,0.6)">person</span>
                        <input type="text" id="loginName" name="username" required placeholder="ชื่อพนักงาน" autocomplete="username" class="login-input">
                    </div>

                    <div>
                        <div class="flex items-center gap-3 mb-4">
                            <div style="height:1px;flex:1;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06))"></div>
                            <span style="font-size:10px;font-weight:700;letter-spacing:0.2em;color:rgba(255,255,255,0.2)">รหัส PIN 6 หลัก</span>
                            <div style="height:1px;flex:1;background:linear-gradient(90deg,rgba(255,255,255,0.06),transparent)"></div>
                        </div>
                        <div id="pinInputs" class="flex justify-center gap-2" onpaste="handlePinPaste(event)">
                            <input type="password" maxlength="1" inputmode="numeric" class="pin-epic">
                            <input type="password" maxlength="1" inputmode="numeric" class="pin-epic">
                            <input type="password" maxlength="1" inputmode="numeric" class="pin-epic">
                            <input type="password" maxlength="1" inputmode="numeric" class="pin-epic">
                            <input type="password" maxlength="1" inputmode="numeric" class="pin-epic">
                            <input type="password" maxlength="1" inputmode="numeric" class="pin-epic">
                        </div>
                        <p style="font-size:10px;color:rgba(255,255,255,0.16);text-align:center;margin-top:12px;letter-spacing:0.04em">* พิมพ์ครบ 6 หลัก ระบบจะเข้าสู่หน้าหลักอัตโนมัติ</p>
                    </div>

                    <label class="flex items-center justify-center gap-3 cursor-pointer select-none" style="color:rgba(255,255,255,0.26);font-size:13px;font-weight:600">
                        <div class="relative">
                            <input type="checkbox" id="rememberMe" class="peer sr-only">
                            <div id="rememberBox" class="w-5 h-5 rounded-md flex items-center justify-center" style="background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);transition:all 0.2s">
                                <span class="material-icons text-white" id="checkIcon" style="font-size:13px;opacity:0;transition:opacity 0.2s">check</span>
                            </div>
                        </div>
                        จำชื่อฉันไว้ในเครื่องนี้
                    </label>

                    <button type="submit" id="hiddenSubmitBtn" class="hidden">Submit</button>
                </form>
            </div>

            <!-- Bottom border glow -->
            <div class="absolute bottom-0 left-8 right-8 h-px" style="background:linear-gradient(90deg,transparent,rgba(80,60,200,0.4),rgba(220,0,0,0.3),transparent)"></div>
        </div>
    </div>
</div>

<script>
(function(){
    const c = document.getElementById('starField');
    if(!c) return;
    for(let i=0;i<280;i++){
        const s = document.createElement('div');
        s.className = 'star';
        const r = Math.random();
        const size = r < 0.75 ? Math.random()*1.2+0.4 : r < 0.95 ? Math.random()*2+1.2 : Math.random()*3+2;
        const bright = Math.random();
        const hue = Math.random()<0.15 ? (Math.random()<0.5?'rgba(180,200,255,':'rgba(255,220,180,') : 'rgba(255,255,255,';
        s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${bright*0.8+0.08};background:${hue}1);animation-duration:${1.5+Math.random()*6}s;animation-delay:${Math.random()*6}s;${size>2?`box-shadow:0 0 ${size*2}px ${hue}0.8)`:''}`;
        c.appendChild(s);
    }
})();

document.getElementById('rememberMe')?.addEventListener('change',function(){
    const icon=document.getElementById('checkIcon'),box=document.getElementById('rememberBox');
    if(this.checked){icon.style.opacity='1';box.style.background='rgba(200,0,0,0.5)';box.style.borderColor='rgba(220,0,0,0.7)'}
    else{icon.style.opacity='0';box.style.background='rgba(255,255,255,0.04)';box.style.borderColor='rgba(255,255,255,0.1)'}
});
</script>
