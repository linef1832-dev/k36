<style>
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin-slow{to{transform:rotate(360deg)}}
@keyframes spin-rev{to{transform:rotate(-360deg)}}
@keyframes pulse-ring{0%{transform:scale(0.9);opacity:0.6}100%{transform:scale(1.5);opacity:0}}
@keyframes slide-up{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes line-move{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
@keyframes glitch1{0%,100%{clip-path:inset(0 0 95% 0);transform:translate(-2px,0)}25%{clip-path:inset(30% 0 50% 0);transform:translate(2px,0)}50%{clip-path:inset(60% 0 20% 0);transform:translate(-1px,0)}75%{clip-path:inset(80% 0 5% 0);transform:translate(1px,0)}}
@keyframes glitch2{0%,100%{clip-path:inset(50% 0 30% 0);transform:translate(2px,0)}25%{clip-path:inset(10% 0 80% 0);transform:translate(-2px,0)}50%{clip-path:inset(70% 0 10% 0);transform:translate(1px,0)}75%{clip-path:inset(20% 0 60% 0);transform:translate(-1px,0)}}
@keyframes pin-success{0%{transform:scale(1)}30%{transform:scale(1.08)}60%{transform:scale(0.97)}100%{transform:scale(1)}}
@keyframes counter-tick{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

#loginScreen{background:#060810;overflow:hidden}

/* Particle canvas */
#particleCanvas{position:absolute;inset:0;pointer-events:none}

.pin-epic{
    width:50px;height:58px;
    background:rgba(255,255,255,0.03);
    border:1.5px solid rgba(255,255,255,0.08);
    border-radius:12px;color:#fff;font-size:26px;font-weight:900;
    text-align:center;outline:none;transition:all 0.18s;caret-color:transparent;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),0 2px 8px rgba(0,0,0,0.3)
}
.pin-epic:focus{
    border-color:rgba(220,0,0,0.85);background:rgba(220,0,0,0.07);
    box-shadow:0 0 0 3px rgba(220,0,0,0.18),0 0 18px rgba(220,0,0,0.25);
    transform:translateY(-2px) scale(1.07)
}
.pin-epic.filled{border-color:rgba(220,0,0,0.4);background:rgba(220,0,0,0.05)}
.pin-epic.success{border-color:rgba(34,197,94,0.7)!important;background:rgba(34,197,94,0.08)!important;box-shadow:0 0 0 3px rgba(34,197,94,0.2)!important;animation:pin-success 0.4s ease}

.login-input{
    width:100%;padding:14px 14px 14px 46px;
    background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
    border-radius:12px;color:#fff;font-weight:600;font-size:14px;outline:none;transition:all 0.25s
}
.login-input::placeholder{color:rgba(255,255,255,0.2)}
.login-input:focus{border-color:rgba(220,0,0,0.5);background:rgba(220,0,0,0.04);box-shadow:0 0 0 3px rgba(220,0,0,0.1)}

.shake{animation:shake 0.5s ease}

/* Glitch logo */
.glitch-wrap{position:relative;display:inline-block}
.glitch-wrap .g1,.glitch-wrap .g2{position:absolute;top:0;left:0;width:100%;opacity:0}
.glitch-wrap.glitching .g1{animation:glitch1 0.3s steps(1) forwards;opacity:0.8;color:#ff0000}
.glitch-wrap.glitching .g2{animation:glitch2 0.3s steps(1) 0.05s forwards;opacity:0.6;color:#0044ff}
</style>

<script>
// ========== Particle Network ==========
(function(){
    const canvas = document.getElementById('particleCanvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, particles=[], mouse={x:-999,y:-999};
    const NUM=55, CONNECT_DIST=130, MOUSE_DIST=160;

    function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
    resize();
    window.addEventListener('resize',resize);
    document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});

    for(let i=0;i<NUM;i++) particles.push({
        x:Math.random()*1920, y:Math.random()*1080,
        vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35,
        r:Math.random()*1.5+.8,
        color:Math.random()<.6?'rgba(220,0,0,':'rgba(60,100,220,'
    });

    function draw(){
        ctx.clearRect(0,0,W,H);
        // update
        particles.forEach(p=>{
            p.x+=p.vx; p.y+=p.vy;
            if(p.x<0||p.x>W) p.vx*=-1;
            if(p.y<0||p.y>H) p.vy*=-1;
        });
        // connect
        for(let i=0;i<particles.length;i++){
            const a=particles[i];
            // mouse influence
            const mdx=mouse.x-a.x, mdy=mouse.y-a.y;
            const md=Math.sqrt(mdx*mdx+mdy*mdy);
            if(md<MOUSE_DIST){
                const force=(MOUSE_DIST-md)/MOUSE_DIST*.6;
                a.x-=mdx/md*force*.8;
                a.y-=mdy/md*force*.8;
            }
            for(let j=i+1;j<particles.length;j++){
                const b=particles[j];
                const dx=a.x-b.x, dy=a.y-b.y;
                const dist=Math.sqrt(dx*dx+dy*dy);
                if(dist<CONNECT_DIST){
                    const alpha=(1-dist/CONNECT_DIST)*.35;
                    ctx.beginPath();
                    ctx.moveTo(a.x,a.y);
                    ctx.lineTo(b.x,b.y);
                    ctx.strokeStyle=`rgba(180,40,40,${alpha})`;
                    ctx.lineWidth=.6;
                    ctx.stroke();
                }
            }
            // dot
            ctx.beginPath();
            ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
            ctx.fillStyle=a.color+'0.5)';
            ctx.fill();
        }
        requestAnimationFrame(draw);
    }
    draw();
})();

// ========== Glitch Effect ==========
(function(){
    const targets=['glitchPG','glitchSG'];
    function doGlitch(){
        const el=document.getElementById(targets[Math.random()<.5?0:1]);
        if(!el) return;
        el.classList.add('glitching');
        setTimeout(()=>el.classList.remove('glitching'),320);
    }
    setInterval(doGlitch, 4000+Math.random()*3000);
})();

// ========== PIN visual fill ==========
document.querySelectorAll('.pin-box').forEach(inp=>{
    inp.addEventListener('input',()=>{
        if(inp.value) inp.classList.add('filled');
        else inp.classList.remove('filled');
    });
});

// ========== Remember me ==========
document.getElementById('rememberMe')?.addEventListener('change',function(){
    const icon=document.getElementById('checkIcon'),box=document.getElementById('rememberBox');
    if(this.checked){icon.style.opacity='1';box.style.background='rgba(200,0,0,0.45)';box.style.borderColor='rgba(220,0,0,0.6)'}
    else{icon.style.opacity='0';box.style.background='rgba(255,255,255,0.03)';box.style.borderColor='rgba(255,255,255,0.09)'}
});

// ========== Shake on error (intercept Swal) ==========
const _origHandleLogin = window.handleLogin;
window.shakeLoginCard = function(){
    const card=document.getElementById('loginCard');
    if(!card) return;
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
    setTimeout(()=>card.classList.remove('shake'),500);
    // flash PIN red
    document.querySelectorAll('.pin-box').forEach(p=>{
        p.style.borderColor='rgba(220,0,0,0.8)';
        p.style.background='rgba(220,0,0,0.08)';
        setTimeout(()=>{p.style.borderColor='';p.style.background=''},600);
    });
};

// ========== PIN success glow ==========
window.pinSuccessAnim = function(){
    document.querySelectorAll('.pin-box').forEach(p=>{
        p.classList.add('success');
    });
};
</script>
