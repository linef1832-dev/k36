<style>
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin-slow{to{transform:rotate(360deg)}}
@keyframes spin-rev{to{transform:rotate(-360deg)}}
@keyframes pulse-ring{0%{transform:scale(0.9);opacity:0.6}100%{transform:scale(1.5);opacity:0}}
@keyframes slide-up{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes line-move{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes grid-fade{0%,100%{opacity:0.03}50%{opacity:0.07}}

#loginScreen{background:#080c14;overflow:hidden}

.pin-epic{width:52px;height:60px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-size:28px;font-weight:900;text-align:center;outline:none;transition:all 0.2s;caret-color:transparent;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.pin-epic:focus{border-color:rgba(220,0,0,0.8);background:rgba(220,0,0,0.07);box-shadow:0 0 0 3px rgba(220,0,0,0.15),0 0 20px rgba(220,0,0,0.2);transform:translateY(-2px) scale(1.06)}
.login-input{width:100%;padding:14px 14px 14px 46px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;color:#fff;font-weight:600;font-size:14px;outline:none;transition:all 0.25s}
.login-input::placeholder{color:rgba(255,255,255,0.2)}
.login-input:focus{border-color:rgba(220,0,0,0.5);background:rgba(220,0,0,0.04);box-shadow:0 0 0 3px rgba(220,0,0,0.1)}
</style>

<div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center p-4">

    <!-- Base gradient -->
    <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(135deg,#060a12 0%,#0a0f1e 40%,#080c18 70%,#060810 100%)"></div>

    <!-- Subtle grid -->
    <div class="absolute inset-0 pointer-events-none" style="background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:60px 60px;animation:grid-fade 8s ease-in-out infinite"></div>

    <!-- Corner gradient overlays (hide grid edges) -->
    <div class="absolute inset-0 pointer-events-none" style="background:radial-gradient(ellipse 60% 60% at 0% 0%,rgba(6,9,18,0.95),transparent),radial-gradient(ellipse 60% 60% at 100% 100%,rgba(6,9,18,0.95),transparent),radial-gradient(ellipse 50% 50% at 100% 0%,rgba(6,9,18,0.9),transparent),radial-gradient(ellipse 50% 50% at 0% 100%,rgba(6,9,18,0.9),transparent)"></div>

    <!-- Accent glow top-left -->
    <div class="absolute pointer-events-none" style="width:500px;height:500px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(180,0,0,0.06),transparent 65%);filter:blur(1px)"></div>

    <!-- Accent glow bottom-right -->
    <div class="absolute pointer-events-none" style="width:600px;height:600px;bottom:-250px;right:-200px;background:radial-gradient(circle,rgba(30,60,180,0.06),transparent 65%);filter:blur(1px)"></div>

    <!-- Thin accent lines (corner decorations) -->
    <div class="absolute top-8 left-8 pointer-events-none" style="width:120px;height:120px">
        <div style="position:absolute;top:0;left:0;width:40px;height:1px;background:linear-gradient(90deg,rgba(220,0,0,0.6),transparent)"></div>
        <div style="position:absolute;top:0;left:0;width:1px;height:40px;background:linear-gradient(180deg,rgba(220,0,0,0.6),transparent)"></div>
    </div>
    <div class="absolute top-8 right-8 pointer-events-none" style="width:120px;height:120px">
        <div style="position:absolute;top:0;right:0;width:40px;height:1px;background:linear-gradient(270deg,rgba(220,0,0,0.6),transparent)"></div>
        <div style="position:absolute;top:0;right:0;width:1px;height:40px;background:linear-gradient(180deg,rgba(220,0,0,0.6),transparent)"></div>
    </div>
    <div class="absolute bottom-8 left-8 pointer-events-none">
        <div style="width:40px;height:1px;background:linear-gradient(90deg,rgba(220,0,0,0.4),transparent)"></div>
        <div style="width:1px;height:40px;background:linear-gradient(0deg,rgba(220,0,0,0.4),transparent);margin-top:-1px"></div>
    </div>
    <div class="absolute bottom-8 right-8 pointer-events-none" style="display:flex;flex-direction:column;align-items:flex-end">
        <div style="width:40px;height:1px;background:linear-gradient(270deg,rgba(220,0,0,0.4),transparent)"></div>
        <div style="width:1px;height:40px;background:linear-gradient(0deg,rgba(220,0,0,0.4),transparent)"></div>
    </div>

    <!-- Bottom status bar -->
    <div class="absolute bottom-6 left-0 right-0 flex items-center justify-center gap-6 pointer-events-none" style="animation:fade-in 1s ease 0.5s both">
        <div class="flex items-center gap-2">
            <div style="width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,0.8)"></div>
            <span style="font-size:10px;letter-spacing:0.15em;color:rgba(255,255,255,0.2);font-weight:600">SYSTEM ONLINE</span>
        </div>
        <div style="width:1px;height:12px;background:rgba(255,255,255,0.1)"></div>
        <div class="flex items-center gap-2">
            <span class="material-icons" style="font-size:11px;color:rgba(255,255,255,0.2)">lock</span>
            <span style="font-size:10px;letter-spacing:0.15em;color:rgba(255,255,255,0.2);font-weight:600">SSL ENCRYPTED</span>
        </div>
        <div style="width:1px;height:12px;background:rgba(255,255,255,0.1)"></div>
        <span style="font-size:10px;letter-spacing:0.1em;color:rgba(255,255,255,0.15);font-weight:600">v2.6.0</span>
    </div>

    <!-- ===== CARD ===== -->
    <div class="relative w-full max-w-sm" style="animation:slide-up 0.6s cubic-bezier(0.16,1,0.3,1);z-index:20">

        <!-- Subtle card glow -->
        <div class="absolute -inset-2 rounded-[1.8rem] pointer-events-none" style="background:radial-gradient(ellipse,rgba(220,0,0,0.08),transparent 70%);filter:blur(16px)"></div>

        <!-- Card border gradient -->
        <div class="absolute -inset-px rounded-[1.6rem] pointer-events-none" style="background:linear-gradient(145deg,rgba(220,0,0,0.25),rgba(255,255,255,0.06),rgba(30,60,180,0.15),rgba(220,0,0,0.2))"></div>

        <!-- Card body -->
        <div class="relative rounded-[1.5rem] overflow-hidden" style="background:linear-gradient(160deg,rgba(10,14,26,0.98),rgba(7,10,20,0.99));box-shadow:0 30px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.04),inset 0 1px 0 rgba(255,255,255,0.05)">

            <!-- Moving shimmer line -->
            <div class="absolute top-0 left-0 right-0 overflow-hidden" style="height:2px">
                <div style="position:absolute;top:0;height:2px;width:30%;background:linear-gradient(90deg,transparent,rgba(220,0,0,0.8),transparent);animation:line-move 4s ease-in-out infinite"></div>
            </div>

            <div class="p-8">
                <!-- Header -->
                <div class="text-center mb-8" style="animation:slide-up 0.6s ease-out 0.1s both">

                    <!-- Icon -->
                    <div class="relative inline-flex items-center justify-center mb-5" style="width:88px;height:88px">
                        <div class="absolute inset-0 rounded-full" style="border:1px solid rgba(220,0,0,0.1)"></div>
                        <div class="absolute inset-0 rounded-full" style="border:1.5px solid transparent;border-top-color:rgba(220,0,0,0.8);border-right-color:rgba(220,0,0,0.15);animation:spin-slow 4s linear infinite"></div>
                        <div class="absolute inset-3 rounded-full" style="border:1px solid transparent;border-bottom-color:rgba(100,60,255,0.4);animation:spin-rev 3s linear infinite"></div>
                        <div class="absolute inset-0 rounded-full" style="border:1.5px solid rgba(220,0,0,0.2);animation:pulse-ring 2.5s ease-out infinite"></div>
                        <div class="relative w-13 h-13 rounded-xl flex items-center justify-center" style="width:52px;height:52px;background:linear-gradient(145deg,#180308,#06000f);border:1px solid rgba(220,0,0,0.3);box-shadow:0 0 24px rgba(220,0,0,0.25),inset 0 1px 0 rgba(255,80,80,0.06);animation:float 4s ease-in-out infinite">
                            <svg width="26" height="26" viewBox="0 0 36 36" fill="none">
                                <polygon points="6,9 12,3 22,18 12,33 6,27 15,18" fill="#dd0000"/>
                                <polygon points="15,18 22,18 25,23 19,30 12,30" fill="#ff4444" opacity="0.85"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Brand -->
                    <div class="font-black flex items-center justify-center gap-1 mb-2" style="font-size:34px;letter-spacing:0.12em">
                        <span style="color:#f0f0f0;text-shadow:0 0 20px rgba(255,255,255,0.15)">PG</span>
                        <span style="color:#dd0000;text-shadow:0 0 16px rgba(220,0,0,0.9),0 0 32px rgba(220,0,0,0.4)">SG</span>
                    </div>

                    <div class="flex items-center justify-center gap-3 mb-3">
                        <div style="height:1px;width:36px;background:linear-gradient(90deg,transparent,rgba(220,0,0,0.35))"></div>
                        <span style="font-size:8.5px;letter-spacing:0.45em;font-weight:800;color:rgba(160,60,255,0.55)">SECURE SYSTEM</span>
                        <div style="height:1px;width:36px;background:linear-gradient(90deg,rgba(220,0,0,0.35),transparent)"></div>
                    </div>

                    <p style="color:rgba(255,255,255,0.25);font-size:12px;font-weight:500;letter-spacing:0.02em">กรุณายืนยันตัวตนเพื่อเข้าใช้งาน</p>
                </div>

                <!-- Form -->
                <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5" style="animation:slide-up 0.6s ease-out 0.2s both">

                    <div class="relative">
                        <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2" style="font-size:17px;color:rgba(200,0,0,0.55)">person</span>
                        <input type="text" id="loginName" name="username" required placeholder="ชื่อพนักงาน" autocomplete="username" class="login-input">
                    </div>

                    <div>
                        <div class="flex items-center gap-3 mb-4">
                            <div style="height:1px;flex:1;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06))"></div>
                            <span style="font-size:10px;font-weight:700;letter-spacing:0.18em;color:rgba(255,255,255,0.18)">รหัส PIN 6 หลัก</span>
                            <div style="height:1px;flex:1;background:linear-gradient(90deg,rgba(255,255,255,0.06),transparent)"></div>
                        </div>
                        <div id="pinInputs" class="flex justify-center gap-2" onpaste="handlePinPaste(event)">
                            <input type="password" maxlength="1" inputmode="numeric" class="pin-epic">
                            <input type="password" maxlength="1" inputmode="numeric" class="pin-epic">
                            <input type="password" maxlength="1" inputmode="numeric" class="pin-epic">
                            <input type="password" maxlength="1" inputmode="numeric" class="pin-epic">
                            <input type="password" maxlength="1" inputmode="numeric" class="pin-epic">
                            <input type="password" maxlength="1" inputmode="numeric" class="pin-epic">
                        </div>
                        <p style="font-size:10px;color:rgba(255,255,255,0.14);text-align:center;margin-top:12px;letter-spacing:0.04em">* พิมพ์ครบ 6 หลัก ระบบจะเข้าสู่หน้าหลักอัตโนมัติ</p>
                    </div>

                    <label class="flex items-center justify-center gap-3 cursor-pointer select-none" style="color:rgba(255,255,255,0.24);font-size:13px;font-weight:600">
                        <div>
                            <input type="checkbox" id="rememberMe" class="peer sr-only">
                            <div id="rememberBox" class="w-5 h-5 rounded-md flex items-center justify-center" style="background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.09);transition:all 0.2s">
                                <span class="material-icons text-white" id="checkIcon" style="font-size:13px;opacity:0;transition:opacity 0.2s">check</span>
                            </div>
                        </div>
                        จำชื่อฉันไว้ในเครื่องนี้
                    </label>

                    <button type="submit" id="hiddenSubmitBtn" class="hidden">Submit</button>
                </form>
            </div>

            <!-- Bottom border -->
            <div class="absolute bottom-0 left-6 right-6 h-px" style="background:linear-gradient(90deg,transparent,rgba(220,0,0,0.2),rgba(80,60,200,0.2),transparent)"></div>
        </div>
    </div>
</div>

<script>
document.getElementById('rememberMe')?.addEventListener('change',function(){
    const icon=document.getElementById('checkIcon'),box=document.getElementById('rememberBox');
    if(this.checked){icon.style.opacity='1';box.style.background='rgba(200,0,0,0.45)';box.style.borderColor='rgba(220,0,0,0.6)'}
    else{icon.style.opacity='0';box.style.background='rgba(255,255,255,0.03)';box.style.borderColor='rgba(255,255,255,0.09)'}
});
</script>
