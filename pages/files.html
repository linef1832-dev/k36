<div class="fade-in flex flex-col h-full bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-10">
    <div class="bg-emerald-700 text-white p-4 shadow-md shrink-0 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-full shadow-inner"><span class="material-icons text-3xl">folder_zip</span></div>
            <div>
                <h1 class="font-bold text-xl">คลังไฟล์ และ โปรแกรม</h1>
                <p class="text-xs text-emerald-100 opacity-90">ดาวน์โหลดโปรแกรมและเอกสารที่จำเป็นสำหรับการทำงาน</p>
            </div>
        </div>
    </div>

    <div class="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 flex flex-wrap gap-4 items-center justify-between shadow-sm z-10 shrink-0">
        <div class="flex items-center gap-3 w-full md:w-auto">
            <div class="relative flex-1 md:w-64">
                <span class="material-icons absolute left-3 top-2.5 text-gray-400 text-[18px]">search</span>
                <input type="text" id="searchFilesInput" onkeyup="renderFilesGrid()" placeholder="ค้นหาชื่อไฟล์..." class="w-full pl-9 pr-3 py-2 bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white rounded-xl text-sm outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition shadow-inner">
            </div>
        </div>
        <div id="filesAdminControls" class="hidden w-full md:w-auto flex justify-end">
            <button onclick="openAddFileModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 shadow-lg transition transform active:scale-95 border border-emerald-400">
                <span class="material-icons text-sm">add_box</span> เพิ่มไฟล์ใหม่
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50 custom-scrollbar">
        <div id="filesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 max-w-[1600px] mx-auto pb-10"></div>
    </div>
</div>
