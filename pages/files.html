<div id="filesApp" class="fade-in flex flex-col h-full bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-10">
    <div class="bg-emerald-700 text-white p-4 shadow-md shrink-0 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-full shadow-inner"><span class="material-icons text-3xl">folder_zip</span></div>
            <div>
                <h1 class="font-bold text-xl">คลังไฟล์ และ โปรแกรม</h1>
                <p class="text-xs text-emerald-100 opacity-90">ดาวน์โหลดโปรแกรมและเอกสารที่จำเป็นสำหรับการทำงาน</p>
            </div>
        </div>
        <button onclick="showPage('dashboard')" class="bg-black/20 hover:bg-black/40 text-white px-4 py-2 rounded-lg font-bold transition flex items-center gap-2 shadow-sm border border-emerald-500/50">
            <span class="material-icons text-sm">arrow_back</span> กลับเมนูหลัก
        </button>
    </div>

    <div class="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 flex flex-wrap gap-4 items-center justify-between shadow-sm z-10 shrink-0">
        <div class="flex items-center gap-3 w-full md:w-auto">
            <div class="relative flex-1 md:w-64">
                <span class="material-icons absolute left-3 top-2.5 text-gray-400 text-[18px]">search</span>
                <input type="text" id="searchFilesInput" onkeyup="renderFilesGrid()" placeholder="ค้นหาชื่อไฟล์..." class="w-full pl-9 pr-3 py-2 bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white rounded-xl text-sm outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition shadow-inner">
            </div>
        </div>
        <div id="filesAdminControls" class="hidden w-full md:w-auto flex justify-end">
            <button onclick="openAddFileModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 shadow-lg transition transform active:scale-95 border border-emerald-400">
                <span class="material-icons text-sm">add_box</span> เพิ่มไฟล์ใหม่
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50 custom-scrollbar">
        <div id="filesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 max-w-[1600px] mx-auto pb-10"></div>
    </div>
</div>

<div id="fileModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4 fade-in backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border border-slate-600">
        <div class="bg-gradient-to-r from-emerald-600 to-teal-600 p-5 flex justify-between items-center text-white">
            <h3 class="font-black text-lg flex items-center gap-2" id="fileModalTitle">
                <span class="material-icons">add_box</span> เพิ่มไฟล์ใหม่
            </h3>
            <button type="button" onclick="document.getElementById('fileModal').classList.add('hidden')" class="hover:text-black/50 transition bg-white/20 p-1 rounded-full"><span class="material-icons text-sm">close</span></button>
        </div>
        
        <form onsubmit="saveFileData(event)" class="p-6 space-y-4 text-left">
            <input type="hidden" id="fileEditId" value="">
            
            <div>
                <label class="block text-[11px] font-bold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">ชื่อไฟล์ / โปรแกรม</label>
                <input type="text" id="fileTitle" required placeholder="เช่น โปรแกรม AutoClick..." class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none font-bold transition shadow-inner">
            </div>
            
            <div class="bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl border border-dashed border-gray-300 dark:border-slate-600">
                <label class="block text-[11px] font-bold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider text-emerald-500">📥 ลิงก์ดาวน์โหลด หรือ อัปโหลดไฟล์ (เลือกหลายไฟล์ได้)</label>
                <input type="text" id="fileExternalUrl" placeholder="วางลิงก์ Google Drive (สำหรับไฟล์ขนาดใหญ่)..." class="w-full p-2.5 border border-gray-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-950 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none text-xs transition shadow-inner mb-2 font-mono placeholder:font-sans">
                
                <div class="flex items-center gap-2 my-2">
                    <div class="h-px bg-gray-300 dark:bg-slate-700 flex-1"></div>
                    <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">หรืออัปโหลดโดยตรง</span>
                    <div class="h-px bg-gray-300 dark:bg-slate-700 flex-1"></div>
                </div>

                <input type="file" id="fileInput" multiple class="w-full p-2 border border-gray-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-950 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none text-sm transition shadow-inner file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-[11px] file:font-bold file:bg-emerald-500 file:text-white hover:file:bg-emerald-600 cursor-pointer">
                <p id="currentFileUrl" class="text-[10px] text-amber-500 mt-2 hidden truncate font-bold bg-amber-50 dark:bg-amber-900/20 p-2 rounded-lg border border-amber-200 dark:border-amber-800/50"></p>
            </div>
            
            <div>
                <label class="block text-[11px] font-bold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">รายละเอียด / รหัสผ่าน (ถ้ามี)</label>
                <input type="text" id="fileDesc" placeholder="อธิบายเพิ่มเติม หรือ รหัสแตกไฟล์" class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none text-sm transition shadow-inner">
            </div>

            <div class="mt-3 border-t border-gray-200 dark:border-slate-700 pt-3">
                <label class="block text-[11px] font-bold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider text-indigo-500">🖼️ รูปภาพหน้าปก (ถ้ามี)</label>
                <input type="file" id="fileCoverInput" accept="image/*" class="w-full p-2 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition shadow-inner file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-indigo-500 file:text-white hover:file:bg-indigo-600 cursor-pointer">
                <div id="currentCoverContainer" class="hidden mt-2">
                    <span class="text-[10px] text-gray-500 block mb-1">รูปปัจจุบัน:</span>
                    <img id="currentFileCover" src="" class="h-16 w-auto rounded-lg border border-gray-300 shadow-sm object-cover bg-black">
                </div>
            </div>

            <button type="submit" id="fileSubmitBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3.5 rounded-xl shadow-lg transition transform active:scale-95 mt-4 text-base border border-emerald-400">
                บันทึกไฟล์
            </button>
        </form>
    </div>
</div>
