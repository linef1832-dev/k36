<div class="fade-in flex flex-col h-full bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-10">
    <div class="bg-gradient-to-r from-emerald-800 to-teal-900 text-white p-4 shadow-lg shrink-0 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-xl shadow-inner"><span class="material-icons text-3xl text-emerald-200">smart_toy</span></div>
            <div>
                <h1 class="font-black text-xl tracking-wide">จัดการระบบบอท (K BIZ Bots)</h1>
                <p class="text-xs text-emerald-200 opacity-90">เพิ่มบัญชีและรหัสผ่านบอท เพื่อให้เซิร์ฟเวอร์ดึงไปใช้งาน</p>
            </div>
        </div>
    </div>

    <div class="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 flex flex-wrap gap-4 items-center justify-between shadow-sm z-10 shrink-0">
        <div class="relative flex-1 md:w-64 max-w-sm">
            <span class="material-icons absolute left-3 top-2.5 text-gray-400 text-[18px]">search</span>
            <input type="text" id="kbizSearchInput" onkeyup="renderKbizGrid()" placeholder="ค้นหาชื่อบอท, เครื่อง..." class="w-full pl-9 pr-3 py-2 bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white rounded-xl text-sm outline-none focus:border-emerald-500 focus:ring-1 transition">
        </div>
        <button onclick="openKbizModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 shadow-lg transition transform active:scale-95 border border-emerald-400">
            <span class="material-icons text-sm">add_box</span> เพิ่มบอทตัวใหม่
        </button>
    </div>

    <div class="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50 custom-scrollbar">
        <div id="kbizGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 max-w-[1600px] mx-auto pb-10"></div>
    </div>
</div>

<div id="kbizModal" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-center justify-center p-4 fade-in backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden border border-slate-200 dark:border-slate-700">
        <div class="bg-gradient-to-r from-emerald-600 to-teal-600 p-4 flex justify-between items-center text-white">
            <h3 id="kbizModalTitle" class="font-bold text-lg flex items-center gap-2"><span class="material-icons">smart_toy</span> เพิ่มบอทตัวใหม่</h3>
            <button type="button" onclick="document.getElementById('kbizModal').classList.add('hidden')" class="text-white/80 hover:text-white p-1 rounded-full bg-white/10 hover:bg-white/20 transition"><span class="material-icons text-sm block">close</span></button>
        </div>
        <form onsubmit="saveKbizBot(event)" class="p-6 space-y-4">
            <input type="hidden" id="kbizEditId">
            <div>
                <label class="block text-[11px] font-bold text-slate-500 dark:text-gray-400 mb-1 uppercase tracking-wider">รหัสเครื่อง (Machine ID)</label>
                <input type="text" id="kbizMachineId" required placeholder="เช่น kbiz1, kbiz-admin..." class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-sm shadow-inner transition">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 dark:text-gray-400 mb-1 uppercase tracking-wider">ชื่อแอดมิน / รายละเอียด (ถ้ามี)</label>
                <input type="text" id="kbizDisplayName" placeholder="เช่น A, B, แอดมินสมชาย..." class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none text-sm shadow-inner transition">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Username</label>
                    <input type="text" id="kbizUser" required placeholder="ชื่อผู้ใช้" class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-sm shadow-inner transition">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Password</label>
                    <input type="text" id="kbizPass" required placeholder="รหัสผ่าน" class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none font-mono text-emerald-500 font-bold text-sm shadow-inner transition">
                </div>
            </div>
            <div class="flex items-center justify-between bg-slate-50 dark:bg-slate-900 p-3 rounded-xl border border-gray-300 dark:border-slate-600 mt-2 shadow-inner">
                <span class="text-sm font-bold text-slate-700 dark:text-gray-300 flex items-center gap-1.5"><span class="material-icons text-emerald-500 text-[18px]">toggle_on</span> เปิดใช้งานบอทตัวนี้</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="kbizIsActive" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-gray-300 dark:bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500 shadow-inner"></div>
                </label>
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3.5 rounded-xl shadow-lg mt-4 transition transform active:scale-95 border border-emerald-400 flex items-center justify-center gap-2">
                <span class="material-icons">save</span> บันทึกข้อมูล
            </button>
        </form>
    </div>
</div>

<div id="kbizTemplates" style="display: none;">
    <template id="tpl-kbiz-card">
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-gray-200 dark:border-slate-700 shadow-sm hover:shadow-lg transition-all group relative flex flex-col h-full transform hover:-translate-y-1">
            <div class="absolute top-3 right-3 flex gap-1 opacity-0 group-hover:opacity-100 transition z-10">
                <button onclick="editKbizBot('{{id}}')" class="text-gray-400 hover:text-amber-500 p-1.5 bg-slate-100 dark:bg-slate-900 rounded-lg shadow-sm transition"><span class="material-icons text-[16px]">edit</span></button>
                <button onclick="deleteKbizBot('{{id}}')" class="text-gray-400 hover:text-red-500 p-1.5 bg-slate-100 dark:bg-slate-900 rounded-lg shadow-sm transition"><span class="material-icons text-[16px]">delete</span></button>
            </div>
            <div class="flex items-center gap-4 mb-4">
                <div class="w-14 h-14 rounded-2xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 flex items-center justify-center shrink-0 shadow-inner"><span class="material-icons text-3xl text-slate-500 dark:text-slate-400">computer</span></div>
                <div class="flex-1 min-w-0 pt-1">
                    <h4 class="font-black text-slate-800 dark:text-white text-lg truncate">{{machine_id}}</h4>
                    <div class="flex items-center gap-1.5 mt-1"><span class="w-2 h-2 rounded-full {{statusColor}} shadow-[0_0_5px_currentColor]"></span><span class="text-[10px] font-bold text-gray-500">{{statusText}}</span></div>
                </div>
            </div>
            <div class="bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl border border-slate-100 dark:border-slate-700 mt-auto space-y-2">
                <div class="text-xs text-gray-500 font-bold truncate">{{display_name}}</div>
                <div class="flex justify-between items-center text-xs border-t border-slate-200 dark:border-slate-700 pt-2">
                    <span class="text-gray-500">User: <b class="text-slate-700 dark:text-gray-300 ml-1">{{username}}</b></span>
                    <span class="text-gray-500">Pass: <b class="text-emerald-600 dark:text-emerald-400 ml-1 blur-sm hover:blur-none transition cursor-pointer select-all" title="คลิกเพื่อดูรหัส">{{password}}</b></span>
                </div>
            </div>
        </div>
    </template>
</div>
