<div id="sheetApp" class="hidden fixed inset-0 z-50 bg-[#0f172a] fade-in flex flex-col custom-scrollbar overflow-y-auto">
    
    <div class="bg-[#151f32] p-4 shadow-md shrink-0 flex flex-col md:flex-row justify-between items-center gap-4 z-30 border-b border-purple-500/30 sticky top-0">
        <div class="flex items-center gap-3 w-full md:w-auto">
            <h1 class="font-black text-xl text-white flex items-center gap-2">
                <span class="material-icons text-purple-500 text-2xl">grid_view</span> หน้าตารางงานรวม
            </h1>
            <button id="btnManageSheet" onclick="openSheetManagerModal()" class="hidden bg-purple-600 hover:bg-purple-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-md transition flex items-center gap-1">
                <span class="material-icons text-[14px]">settings</span> จัดการชีท
            </button>
        </div>
        
        <div class="flex items-center gap-3 w-full md:w-auto justify-end">
            <div class="relative w-full md:w-64">
                <span class="material-icons absolute left-3 top-2 text-gray-400 text-sm">search</span>
                <input type="text" id="sheetSearchInput" onkeyup="renderSheetGrid()" placeholder="ค้นหาชื่อ..." class="w-full pl-9 pr-3 py-1.5 bg-slate-900 border border-slate-600 rounded-lg text-xs text-white outline-none focus:border-purple-500 shadow-inner">
            </div>
            <button onclick="showPage('dashboard')" class="bg-slate-700 hover:bg-slate-600 border border-slate-500 text-white px-4 py-1.5 rounded-lg text-xs font-bold transition shadow-sm flex items-center gap-1 whitespace-nowrap">
                <span class="material-icons text-[14px]">arrow_back</span> กลับหน้าหลัก
            </button>
        </div>
    </div>

    <div class="p-6 flex-1 w-full max-w-7xl mx-auto">
        <div id="sheetGridContainer" class="flex flex-col gap-8">
            </div>
    </div>

</div>

<div id="sheetManageModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] items-center justify-center p-4 animate-fade-in">
    <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md overflow-hidden transform transition-all">
        <div class="bg-gradient-to-r from-purple-600 to-indigo-600 p-4 flex justify-between items-center">
            <h3 class="text-lg font-bold text-white flex items-center gap-2"><span class="material-icons">edit_document</span> จัดการข้อมูลหน้าชีท</h3>
            <button type="button" onclick="closeSheetManagerModal()" class="text-white/80 hover:text-white bg-black/20 rounded-full w-8 h-8 flex items-center justify-center"><span class="material-icons text-sm">close</span></button>
        </div>
        
        <form onsubmit="saveSheetData(event)" class="p-5 space-y-4">
            <input type="hidden" id="sheetEditId">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">หมวดหมู่ (Category)</label>
                    <input type="text" id="sheetCategory" required placeholder="เช่น ทางเข้าหน้าเว็บ, งาน OD" class="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-600 text-white text-sm outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">ชื่อปุ่ม (Title)</label>
                    <input type="text" id="sheetTitle" required placeholder="เช่น F168" class="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-600 text-white text-sm outline-none focus:border-purple-500">
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1">ลิงก์ปลายทาง (URL)</label>
                <input type="url" id="sheetUrl" required placeholder="https://..." class="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-600 text-white text-sm outline-none focus:border-purple-500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">ไอคอน (Material Icon)</label>
                    <input type="text" id="sheetIcon" placeholder="เช่น public, grid_view" class="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-600 text-white text-sm outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">รูปลิงก์พื้นหลัง (Image URL)</label>
                    <input type="text" id="sheetBgImage" placeholder="วางลิงก์รูปภาพ (ถ้ามี)" class="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-600 text-white text-sm outline-none focus:border-purple-500">
                </div>
            </div>

            <div class="pt-4 flex gap-3 border-t border-slate-700">
                <button type="button" id="btnDeleteSheet" onclick="deleteSheetData()" class="hidden bg-red-500/20 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-lg text-sm font-bold transition">ลบข้อมูล</button>
                <button type="submit" class="flex-1 bg-purple-600 hover:bg-purple-500 text-white font-bold py-2 rounded-lg shadow-md transition">บันทึกข้อมูล</button>
            </div>
        </form>
    </div>
</div>
