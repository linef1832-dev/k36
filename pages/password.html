<div class="fade-in flex flex-col h-full bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-10">
    <div class="bg-amber-600 text-white p-4 shadow-md shrink-0 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-xl shadow-inner"><span class="material-icons text-3xl">vpn_key</span></div>
            <div>
                <h1 class="font-bold text-xl">จัดการรหัสผ่าน (Password Manager)</h1>
                <p class="text-xs text-amber-100 opacity-90" id="pwdStaffLabel">เก็บรหัสผ่านของคุณอย่างปลอดภัย</p>
            </div>
        </div>
        <button onclick="showPage('dashboard')" class="bg-black/20 hover:bg-black/40 text-white px-4 py-2 rounded-lg font-bold transition flex items-center gap-2 shadow-sm border border-amber-500/50 backdrop-blur-sm shrink-0">
            <span class="material-icons text-sm">arrow_back</span> กลับเมนูหลัก
        </button>
    </div>

    <div class="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 flex flex-wrap gap-4 items-center justify-between shadow-sm z-10 shrink-0">
        <div class="flex items-center gap-3 w-full md:w-auto">
            <div class="relative flex-1 md:w-64">
                <span class="material-icons absolute left-3 top-2.5 text-gray-400 text-[18px]">search</span>
                <input type="text" id="pwdSearchInput" oninput="filterPwdCards()" placeholder="ค้นหาชื่อเว็บ, User..."
                    class="w-full pl-9 pr-3 py-2 bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white rounded-xl text-sm outline-none focus:border-amber-500 transition shadow-inner">
            </div>
            <div id="pwdManagerControls" class="hidden flex items-center gap-2 bg-slate-100 dark:bg-slate-900 px-3 py-1.5 rounded-xl border border-slate-200 dark:border-slate-700">
                <span class="text-xs font-bold text-gray-500">ดูรหัสของ:</span>
                <select id="pwdUserFilter" onchange="fetchPasswords()" class="bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-white text-xs font-bold outline-none cursor-pointer rounded-lg px-2 py-1 border border-slate-300 dark:border-slate-600">
                    <option value="all" class="bg-white dark:bg-slate-800 text-slate-800 dark:text-white">-- ดูทั้งหมด --</option>
                </select>
            </div>
        </div>
        <div class="w-full md:w-auto flex justify-end">
            <button onclick="openAddPwdModal()" class="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 shadow-lg transition active:scale-95 border border-amber-400">
                <span class="material-icons text-sm">add_box</span> เพิ่มรหัสผ่าน
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50 custom-scrollbar">
        <div id="pwdGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 max-w-7xl mx-auto pb-10"></div>
    </div>
</div>

<!-- Modal เพิ่มรหัสผ่าน -->
<div id="pwdModal" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-center justify-center p-4 fade-in backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden border border-slate-200 dark:border-slate-700">
        <div class="bg-gradient-to-r from-amber-500 to-orange-600 p-4 flex justify-between items-center">
            <h3 class="font-bold text-white text-lg flex items-center gap-2"><span class="material-icons">vpn_key</span> บันทึกรหัสผ่าน</h3>
            <button onclick="document.getElementById('pwdModal').classList.add('hidden')" class="text-white/80 hover:text-white"><span class="material-icons">close</span></button>
        </div>
        <form onsubmit="savePassword(event)" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-600 dark:text-gray-400 mb-1">ชื่อเว็บ / รายการ</label>
                <input type="text" id="pwdSite" required placeholder="เช่น Facebook, หลังบ้าน Jun88..."
                    class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-amber-500 outline-none font-bold">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-600 dark:text-gray-400 mb-1">ลิงก์เว็บ (URL) <span class="text-xs font-normal text-gray-400">(ไม่บังคับ)</span></label>
                <div class="relative">
                    <span class="material-icons absolute left-3 top-3 text-gray-400 text-sm">link</span>
                    <input type="text" id="pwdUrl" placeholder="https://..."
                        class="w-full pl-9 p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-amber-500 outline-none font-mono text-sm">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-bold text-slate-600 dark:text-gray-400 mb-1">Username</label>
                    <input type="text" id="pwdUser" placeholder="ชื่อผู้ใช้"
                        class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-amber-500 outline-none font-bold">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 dark:text-gray-400 mb-1">Password</label>
                    <div class="relative">
                        <input type="text" id="pwdPass" required placeholder="รหัสผ่าน"
                            oninput="checkPwdStrength(this.value)"
                            class="w-full p-3 pr-10 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-amber-500 outline-none font-mono text-red-500 font-bold transition">
                        <!-- ปุ่มสุ่มรหัสผ่าน -->
                        <button type="button" onclick="generatePassword()"
                            class="absolute right-2 top-2.5 text-amber-500 hover:text-amber-400 transition"
                            title="สุ่มรหัสผ่านแข็งแรง">
                            <span class="material-icons text-[20px]">casino</span>
                        </button>
                    </div>
                    <!-- Strength meter -->
                    <div class="mt-1.5">
                        <div class="h-1.5 w-full bg-gray-200 dark:bg-slate-700 rounded-full overflow-hidden">
                            <div id="pwdStrengthBar" class="h-full rounded-full transition-all duration-300" style="width:0%;background:#ef4444"></div>
                        </div>
                        <span id="pwdStrengthLabel" class="text-[10px] font-bold mt-0.5 block"></span>
                    </div>
                </div>
            </div>
            <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-xl shadow-lg mt-2 transition active:scale-95 border border-amber-500">บันทึก</button>
        </form>
    </div>
</div>

<!-- Templates -->
<div id="pwdTemplates" class="hidden">
    <template id="tpl-pwd-card">
        <div class="pwd-card bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-slate-200 dark:border-slate-700 relative group hover:shadow-md transition" data-search="{{site_name}} {{login_user}}">
            {{ownerBadge}}
            <div class="flex items-center gap-3 mb-3">
                <div class="w-10 h-10 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center shrink-0">
                    <span class="material-icons text-xl">language</span>
                </div>
                <div class="overflow-hidden">
                    <h4 class="font-bold text-slate-800 dark:text-white truncate text-base">{{site_name}}</h4>
                    {{urlHtml}}
                </div>
            </div>

            <div class="space-y-2 bg-slate-50 dark:bg-slate-900 p-3 rounded-lg border border-slate-200 dark:border-slate-700">
                <!-- Username row -->
                <div class="flex justify-between items-center text-xs">
                    <span class="text-gray-500 shrink-0">User:</span>
                    <div class="flex items-center gap-1 min-w-0">
                        <span class="font-mono font-bold text-slate-700 dark:text-gray-300 truncate select-all">{{login_user}}</span>
                        <button onclick="copyTextFlash('{{login_user}}', this)" class="text-gray-400 hover:text-blue-500 shrink-0 transition">
                            <span class="material-icons text-xs">content_copy</span>
                        </button>
                    </div>
                </div>
                <!-- Password row -->
                <div class="flex justify-between items-center text-xs">
                    <span class="text-gray-500 shrink-0">Pass:</span>
                    <div class="flex items-center gap-1 min-w-0">
                        <span id="pass_{{id}}" class="font-mono font-bold text-red-600 dark:text-red-400 blur-sm transition-all duration-200 cursor-pointer select-all truncate"
                              title="กดปุ่มตาเพื่อดู">{{login_pass}}</span>
                        <!-- ปุ่มแสดง/ซ่อน (auto-hide 5 วิ) -->
                        <button onclick="togglePwdVisible('{{id}}', this)" class="text-gray-400 hover:text-amber-500 shrink-0 transition" title="แสดง/ซ่อน (ซ่อนอัตโนมัติใน 5 วิ)">
                            <span class="material-icons text-xs">visibility</span>
                        </button>
                        <button onclick="copyTextFlash('{{login_pass}}', this)" class="text-gray-400 hover:text-blue-500 shrink-0 transition">
                            <span class="material-icons text-xs">content_copy</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-3 flex justify-end gap-2 border-t pt-2 dark:border-slate-700">
                {{delBtn}}
            </div>
        </div>
    </template>
</div>
