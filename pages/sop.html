<div id="sopApp" class="fade-in flex flex-col h-full bg-slate-100 dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-10">
    <div class="bg-gradient-to-r from-rose-600 via-pink-600 to-orange-600 text-white p-5 shadow-lg shrink-0 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2.5 rounded-2xl shadow-inner backdrop-blur-sm border border-white/20"><span class="material-icons text-3xl">rule_folder</span></div>
            <div>
                <h1 class="font-black text-xl md:text-2xl tracking-wide drop-shadow-sm">คู่มือการทำงาน (OD)</h1>
                <p class="text-xs text-rose-100 opacity-90 mt-0.5">กฎกลาง — กะเช้า/กะดึก ใช้กฎเดียวกัน</p>
            </div>
        </div>
        <button onclick="showPage('dashboard')" class="bg-black/30 hover:bg-black/50 text-white px-4 py-2 rounded-xl font-bold transition flex items-center gap-2 shadow-sm border border-white/20 backdrop-blur-sm">
            <span class="material-icons text-sm">arrow_back</span> กลับเมนูหลัก
        </button>
    </div>

    <!-- 🆕 TAB BAR -->
    <div class="bg-white dark:bg-slate-800 border-b dark:border-slate-700 shadow-sm z-10 shrink-0 px-4 pt-3 flex gap-2">
        <button id="sopTabBtn_rules" onclick="sop_switchTab('rules')" class="sop-tab-btn flex items-center gap-2 px-4 md:px-6 py-2.5 rounded-t-2xl font-bold text-sm transition border border-b-0 shadow-sm bg-gradient-to-b from-orange-500 to-amber-500 text-white border-orange-400 -mb-px">
            <span class="material-icons text-[18px]">gavel</span>
            <span>กติกาขั้นตอน</span>
            <span id="sopTabRulesCount" class="bg-white/30 text-white text-[10px] font-black px-2 py-0.5 rounded-full ml-1"></span>
        </button>
        <button id="sopTabBtn_sop" onclick="sop_switchTab('sop')" class="sop-tab-btn flex items-center gap-2 px-4 md:px-6 py-2.5 rounded-t-2xl font-bold text-sm transition border border-b-0 shadow-sm bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-gray-400 border-gray-300 dark:border-slate-600 hover:bg-slate-200 dark:hover:bg-slate-700">
            <span class="material-icons text-[18px]">menu_book</span>
            <span>ขั้นตอนต่างๆ</span>
            <span id="sopTabSopCount" class="bg-slate-300 dark:bg-slate-700 text-slate-700 dark:text-gray-300 text-[10px] font-black px-2 py-0.5 rounded-full ml-1"></span>
        </button>
    </div>

    <!-- 🟠 TAB 1: หน้ากติกาขั้นตอน — Layout 2 คอลัมน์ -->
    <div id="sopTab_rules" class="flex-1 overflow-hidden flex flex-col">
        <div class="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 shadow-sm shrink-0">
            <div class="flex flex-wrap gap-2.5 items-center">
                <div class="relative flex-1 md:max-w-xs min-w-[200px]">
                    <span class="material-icons absolute left-3 top-2.5 text-gray-400 text-[18px]">search</span>
                    <input type="text" id="sopRulesSearch" onkeyup="sop_renderAllRulesPage()" placeholder="ค้นหาในกติกา..." class="w-full pl-9 pr-3 py-2 bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white rounded-xl text-sm outline-none focus:border-orange-500 transition shadow-inner">
                </div>
                <select id="sopRulesCatFilter" onchange="sop_renderAllRulesPage()" class="bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white px-3 py-2 rounded-xl outline-none focus:border-orange-500 font-bold text-sm cursor-pointer shadow-inner">
                    <option value="ALL">📂 ทุกหมวดหมู่</option>
                </select>
                <select id="sopRulesTypeFilter" onchange="sop_renderAllRulesPage()" class="bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white px-3 py-2 rounded-xl outline-none focus:border-orange-500 font-bold text-sm cursor-pointer shadow-inner">
                    <option value="ALL">🎯 ทุกประเภท</option>
                    <option value="do">🟢 ทำได้</option>
                    <option value="must">🟠 ต้องทำ</option>
                    <option value="dont">🔴 ห้ามทำ</option>
                    <option value="info">🔵 หมายเหตุ</option>
                </select>
                <div id="sopRulesAdminControls" class="hidden ml-auto flex gap-2">
                    <button onclick="sop_manageCategories()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1 shadow transition border border-slate-500">
                        <span class="material-icons text-sm">category</span> หมวดหมู่/สี
                    </button>
                    <button onclick="sop_quickAddRule()" class="bg-gradient-to-r from-orange-600 to-amber-600 hover:from-orange-500 hover:to-amber-500 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 shadow-lg transition transform active:scale-95 border border-orange-400">
                        <span class="material-icons text-sm">add_circle</span> เพิ่มกติกาใหม่
                    </button>
                </div>
            </div>
        </div>

        <!-- 2-column layout เหมือนหน้า SOP -->
        <div class="flex-1 overflow-hidden p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50">
            <div class="max-w-[1600px] mx-auto h-full grid grid-cols-1 lg:grid-cols-12 gap-6">
                <!-- ซ้าย: สารบัญ (หมวดหมู่ + กติกาในหมวด) -->
                <div class="lg:col-span-4 bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-lg p-5 flex flex-col h-full overflow-hidden">
                    <h3 class="text-slate-800 dark:text-white font-black mb-4 flex items-center gap-2 border-b dark:border-slate-700 pb-3 text-lg">
                        <span class="material-icons text-orange-500">list_alt</span>
                        สารบัญกติกา
                        <span id="sopRulesCount" class="ml-auto text-xs font-bold text-gray-400 bg-slate-100 dark:bg-slate-900 px-2 py-1 rounded-md border border-gray-200 dark:border-slate-700"></span>
                    </h3>
                    <div id="sopAllRulesTocContainer" class="flex-1 overflow-y-auto custom-scrollbar pr-2"></div>
                </div>
                <!-- ขวา: เนื้อหาของหมวดที่เลือก -->
                <div class="lg:col-span-8 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl flex flex-col h-full overflow-hidden">
                    <div id="sopAllRulesContainer" class="flex-1 overflow-y-auto custom-scrollbar p-4 sm:p-6"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 📖 TAB 2: หน้า SOP รายละเอียด (เดิม) -->
    <div id="sopTab_sop" class="hidden flex-1 overflow-hidden flex flex-col">
        <div class="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 shadow-sm shrink-0">
            <div class="flex flex-wrap gap-2.5 items-center">
                <div class="relative flex-1 md:max-w-xs min-w-[200px]">
                    <span class="material-icons absolute left-3 top-2.5 text-gray-400 text-[18px]">search</span>
                    <input type="text" id="sopSearch" onkeyup="sop_renderList()" placeholder="ค้นหากฎ / tag..." class="w-full pl-9 pr-3 py-2 bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white rounded-xl text-sm outline-none focus:border-rose-500 transition shadow-inner">
                </div>
                <select id="sopCategory" onchange="sop_renderList()" class="bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white px-3 py-2 rounded-xl outline-none focus:border-rose-500 font-bold text-sm cursor-pointer shadow-inner">
                    <option value="ALL">📂 ทุกหมวดหมู่</option>
                </select>
                <select id="sopShiftFilter" onchange="sop_renderList()" class="bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white px-3 py-2 rounded-xl outline-none focus:border-rose-500 font-bold text-sm cursor-pointer shadow-inner">
                    <option value="ALL">🌐 ทุกกะ</option>
                    <option value="morning">🌅 กะเช้า</option>
                    <option value="mid">☀️ กะกลาง</option>
                    <option value="night">🌃 กะดึก</option>
                </select>
                <select id="sopPriorityFilter" onchange="sop_renderList()" class="bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white px-3 py-2 rounded-xl outline-none focus:border-rose-500 font-bold text-sm cursor-pointer shadow-inner">
                    <option value="ALL">⚡ ทุกระดับ</option>
                    <option value="high">🔴 สำคัญมาก</option>
                    <option value="medium">🟡 ปานกลาง</option>
                    <option value="low">🟢 ทั่วไป</option>
                </select>
                <button onclick="sop_togglePinFilter()" id="sopPinFilterBtn" class="bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-700 dark:text-gray-300 px-3 py-2 rounded-xl outline-none font-bold text-sm cursor-pointer shadow-inner hover:border-amber-400 transition flex items-center gap-1">
                    <span class="material-icons text-[16px]">push_pin</span> เฉพาะปักหมุด
                </button>
                <div id="sopAdminControls" class="hidden ml-auto flex gap-2">
                    <button onclick="sop_manageCategories()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1 shadow transition border border-slate-500">
                        <span class="material-icons text-sm">category</span> หมวดหมู่
                    </button>
                    <button onclick="sop_openAddModal()" class="bg-gradient-to-r from-rose-600 to-pink-600 hover:from-rose-500 hover:to-pink-500 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 shadow-lg transition transform active:scale-95 border border-rose-400">
                        <span class="material-icons text-sm">add_circle</span> เพิ่มกฎใหม่
                    </button>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-hidden p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50">
            <div class="max-w-[1600px] mx-auto h-full grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-lg p-5 flex flex-col h-full overflow-hidden">
                    <h3 class="text-slate-800 dark:text-white font-black mb-4 flex items-center gap-2 border-b dark:border-slate-700 pb-3 text-lg">
                        <span class="material-icons text-rose-500">list_alt</span>
                        สารบัญกฎ
                        <span id="sopCount" class="ml-auto text-xs font-bold text-gray-400 bg-slate-100 dark:bg-slate-900 px-2 py-1 rounded-md border border-gray-200 dark:border-slate-700"></span>
                    </h3>
                    <div id="sopListContainer" class="flex-1 overflow-y-auto custom-scrollbar space-y-2.5 pr-2"></div>
                </div>
                <div class="lg:col-span-8 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl flex flex-col h-full overflow-hidden">
                    <div id="sopReaderContent" class="flex-1 overflow-y-auto custom-scrollbar"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="sop-templates" class="hidden">

    <template id="tpl-sop-list-item">
        <div class="cursor-pointer rounded-2xl border-l-4 {{priorityBorder}} {{activeBg}} transition group shadow-sm relative overflow-hidden">
            {{pinIcon}}
            <div onclick="sop_readRule('{{id}}')" class="p-3.5 flex gap-3">
                <div class="mt-0.5 shrink-0">
                    <span class="material-icons {{iconColor}} text-[22px] bg-white dark:bg-slate-800 p-2 rounded-xl shadow-sm border border-gray-100 dark:border-slate-600 group-hover:scale-110 transition">{{icon}}</span>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-start gap-1.5 mb-1">
                        {{priorityBadge}}
                        <h4 class="text-slate-800 dark:text-white font-bold text-sm truncate group-hover:text-rose-600 dark:group-hover:text-rose-400 transition flex-1 leading-snug">{{title}}</h4>
                    </div>
                    <div class="flex items-center gap-1.5 text-[10px] font-bold text-gray-500 flex-wrap">
                        <span class="bg-white dark:bg-slate-800 px-2 py-0.5 rounded-md border border-gray-200 dark:border-slate-600 shadow-sm">{{displayCat}}</span>
                        {{shiftBadges}}
                        {{readIndicator}}
                    </div>
                    {{tagsHtml}}
                </div>
            </div>
            <div onclick="sop_readRule('{{id}}')" class="bg-slate-50 dark:bg-slate-800/50 border-t border-gray-100 dark:border-slate-700 px-3.5 py-1.5 flex items-center gap-3 text-[9px] text-gray-500 dark:text-gray-400 font-bold">
                <span class="flex items-center gap-0.5"><span class="material-icons text-[11px]">update</span>{{date}}</span>
                <span class="flex items-center gap-0.5"><span class="material-icons text-[11px]">visibility</span>{{viewCount}}</span>
                {{rulesCountBadge}}
                {{attachmentIcon}}
                {{moveCategoryBtn}}
            </div>
        </div>
    </template>

    <template id="tpl-sop-read">
        <div class="fade-in">
            <!-- Hero Header -->
            <div class="bg-gradient-to-br from-slate-50 to-white dark:from-slate-800 dark:to-slate-900 p-6 md:p-8 border-b border-gray-200 dark:border-slate-700">
                <div class="flex flex-wrap items-center gap-2 mb-3">
                    {{priorityBigBadge}}
                    {{pinnedBigBadge}}
                    <span class="bg-rose-100 dark:bg-rose-900/40 text-rose-700 dark:text-rose-300 px-3 py-1 rounded-full text-[11px] font-black border border-rose-200 dark:border-rose-700 shadow-sm">{{displayCat}}</span>
                    {{shiftBigBadges}}
                </div>
                <h1 class="text-2xl md:text-3xl font-black text-slate-800 dark:text-white leading-tight break-words mb-3">{{title}}</h1>
                {{tagsBigHtml}}
            </div>

            <!-- Toolbar (action buttons) -->
            <div class="bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 px-6 md:px-8 py-3 flex justify-between items-center gap-3 flex-wrap">
                <div class="flex items-center gap-3 flex-wrap text-[10px] font-bold text-gray-500 dark:text-gray-400">
                    <span class="flex items-center gap-1 bg-slate-100 dark:bg-slate-900 px-2.5 py-1.5 rounded-lg border border-gray-200 dark:border-slate-700 shadow-inner"><span class="material-icons text-[12px] text-blue-500">person</span><span class="text-slate-700 dark:text-gray-300">{{author_name}}</span></span>
                    <span class="flex items-center gap-1 bg-slate-100 dark:bg-slate-900 px-2.5 py-1.5 rounded-lg border border-gray-200 dark:border-slate-700 shadow-inner"><span class="material-icons text-[12px] text-purple-500">edit</span><span class="text-slate-700 dark:text-gray-300">{{updateDateStr}}</span></span>
                    {{lastEditorBadge}}
                </div>
                <div class="flex items-center gap-1.5 flex-wrap justify-end">
                    <button onclick="sop_copyRule('{{id}}')" class="bg-blue-50 dark:bg-blue-900/30 hover:bg-blue-100 dark:hover:bg-blue-900/50 text-blue-600 dark:text-blue-300 p-2 rounded-lg transition border border-blue-200 dark:border-blue-700 shadow-sm flex items-center gap-1 text-xs font-bold" title="ก๊อปกฎทั้งหมด"><span class="material-icons text-[18px]">content_copy</span></button>
                    {{readBtn}}
                    {{adminBtns}}
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 px-6 md:px-8 py-4 bg-slate-50 dark:bg-slate-900 border-b border-gray-200 dark:border-slate-700">
                <div class="bg-white dark:bg-slate-800 rounded-xl p-3 border border-gray-200 dark:border-slate-700 shadow-sm flex items-center gap-2.5">
                    <div class="bg-blue-100 dark:bg-blue-900/40 p-2 rounded-lg"><span class="material-icons text-blue-600 dark:text-blue-300 text-[18px]">visibility</span></div>
                    <div class="min-w-0">
                        <div class="text-lg font-black text-slate-800 dark:text-white leading-none">{{viewCount}}</div>
                        <div class="text-[9px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">เปิดอ่าน</div>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-800 rounded-xl p-3 border border-gray-200 dark:border-slate-700 shadow-sm flex items-center gap-2.5">
                    <div class="bg-emerald-100 dark:bg-emerald-900/40 p-2 rounded-lg"><span class="material-icons text-emerald-600 dark:text-emerald-300 text-[18px]">verified</span></div>
                    <div class="min-w-0">
                        <div class="text-lg font-black text-slate-800 dark:text-white leading-none">{{readCount}}</div>
                        <div class="text-[9px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">คนอ่านแล้ว</div>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-800 rounded-xl p-3 border border-gray-200 dark:border-slate-700 shadow-sm flex items-center gap-2.5">
                    <div class="bg-amber-100 dark:bg-amber-900/40 p-2 rounded-lg"><span class="material-icons text-amber-600 dark:text-amber-300 text-[18px]">attach_file</span></div>
                    <div class="min-w-0">
                        <div class="text-lg font-black text-slate-800 dark:text-white leading-none">{{attachmentCount}}</div>
                        <div class="text-[9px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">ไฟล์แนบ</div>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-800 rounded-xl p-3 border border-gray-200 dark:border-slate-700 shadow-sm flex items-center gap-2.5">
                    <div class="bg-purple-100 dark:bg-purple-900/40 p-2 rounded-lg"><span class="material-icons text-purple-600 dark:text-purple-300 text-[18px]">edit_note</span></div>
                    <div class="min-w-0">
                        <div class="text-lg font-black text-slate-800 dark:text-white leading-none">{{historyCount}}</div>
                        <div class="text-[9px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">แก้ไขแล้ว</div>
                    </div>
                </div>
            </div>

            <!-- Main Content Blocks -->
            <div class="p-6 md:p-8 space-y-5 bg-slate-100 dark:bg-slate-900/50">

                {{attachmentsBlock}}

                {{examplesBlock}}

                <!-- BLOCK: รายละเอียด -->
                <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-md overflow-hidden">
                    <div class="bg-gradient-to-r from-rose-500 to-pink-500 px-5 py-3 flex items-center gap-2">
                        <div class="bg-white/20 p-1.5 rounded-lg"><span class="material-icons text-white text-[18px]">description</span></div>
                        <h3 class="text-white font-black text-sm tracking-wide">รายละเอียด / ขั้นตอน</h3>
                    </div>
                    <div class="p-5 bg-rose-50/40 dark:bg-slate-800/80 text-slate-800 dark:text-white text-sm md:text-base leading-relaxed whitespace-pre-wrap font-medium">{{formattedContent}}</div>
                </div>

                {{rulesBlock}}

                {{readReceiptsBlock}}

                {{historyBlock}}

                <div class="h-6"></div>
            </div>
        </div>
    </template>

    <!-- BLOCK: ปุ่มเปิดหน้ากติกา (V3.3 — ใช้ inline ใน JS แล้ว ไม่ต้องเทมเพลต) -->

    <!-- BLOCK: กติกา -->
    <template id="tpl-sop-rules">
        <div class="bg-white dark:bg-slate-800 rounded-2xl border-2 border-orange-300 dark:border-orange-700/50 shadow-md overflow-hidden">
            <div class="bg-gradient-to-r from-orange-500 to-amber-500 px-5 py-3 flex items-center gap-2">
                <div class="bg-white/20 p-1.5 rounded-lg"><span class="material-icons text-white text-[18px]">gavel</span></div>
                <h3 class="text-white font-black text-sm tracking-wide">กติกา / ข้อบังคับ</h3>
                <span class="ml-auto bg-white/20 text-white text-[10px] font-black px-2 py-0.5 rounded-full backdrop-blur-sm">{{rulesCount}} ข้อ</span>
            </div>
            <div class="p-5 space-y-2.5 bg-orange-50/40 dark:bg-slate-800/80">{{rulesItemsHtml}}</div>
        </div>
    </template>

    <template id="tpl-sop-rule-item">
        <div class="flex items-start gap-3 p-3 {{ruleItemBg}} rounded-xl border {{ruleItemBorder}}">
            <div class="shrink-0 mt-0.5"><span class="material-icons {{ruleIconColor}}">{{ruleIcon}}</span></div>
            <div class="flex-1 text-sm md:text-[15px] text-slate-800 dark:text-white font-medium leading-relaxed whitespace-pre-wrap">{{ruleText}}</div>
        </div>
    </template>

    <!-- BLOCK: ผู้รับทราบ (V3.2 — แบบพับเก็บได้) -->
    <template id="tpl-sop-read-receipts">
        <details class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-md overflow-hidden group">
            <summary class="cursor-pointer bg-gradient-to-r from-emerald-500 to-teal-500 px-5 py-3 flex items-center gap-2 list-none">
                <div class="bg-white/20 p-1.5 rounded-lg"><span class="material-icons text-white text-[18px]">verified</span></div>
                <h3 class="text-white font-black text-sm tracking-wide">ผู้รับทราบกฎนี้</h3>
                <span class="ml-auto bg-white/20 text-white text-[10px] font-black px-2 py-0.5 rounded-full backdrop-blur-sm">{{count}} คน</span>
                <span class="material-icons text-white group-open:rotate-180 transition text-[18px]">expand_more</span>
            </summary>
            <div class="p-5 bg-emerald-50/40 dark:bg-slate-800/80">{{readReceiptsContent}}</div>
        </details>
    </template>

    <template id="tpl-sop-read-receipt-chip">
        <div class="inline-flex items-center gap-1.5 bg-white dark:bg-slate-900 border border-emerald-300 dark:border-emerald-700 rounded-full pl-1 pr-3 py-1 shadow-sm hover:shadow-md transition">
            <div class="w-6 h-6 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-white font-black text-[10px] shadow-inner">{{initials}}</div>
            <span class="text-xs font-bold text-slate-700 dark:text-gray-200">{{username}}</span>
            <span class="material-icons text-[12px] text-emerald-500">check_circle</span>
        </div>
    </template>

    <!-- BLOCK: ตัวอย่างเคส -->
    <template id="tpl-sop-examples">
        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-md overflow-hidden">
            <div class="bg-gradient-to-r from-blue-500 to-cyan-500 px-5 py-3 flex items-center gap-2">
                <div class="bg-white/20 p-1.5 rounded-lg"><span class="material-icons text-white text-[18px]">lightbulb</span></div>
                <h3 class="text-white font-black text-sm tracking-wide">ตัวอย่างเคส / สถานการณ์</h3>
            </div>
            <div class="p-5 bg-blue-50/40 dark:bg-slate-800/80 text-slate-800 dark:text-white text-sm md:text-base leading-relaxed whitespace-pre-wrap font-medium">{{formattedExamples}}</div>
        </div>
    </template>

    <!-- BLOCK: ไฟล์แนบ -->
    <template id="tpl-sop-attachments">
        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-md overflow-hidden">
            <div class="bg-gradient-to-r from-amber-500 to-yellow-500 px-5 py-3 flex items-center gap-2">
                <div class="bg-white/20 p-1.5 rounded-lg"><span class="material-icons text-white text-[18px]">attach_file</span></div>
                <h3 class="text-white font-black text-sm tracking-wide">ไฟล์ประกอบ</h3>
                <span class="ml-auto bg-white/20 text-white text-[10px] font-black px-2 py-0.5 rounded-full backdrop-blur-sm">{{count}} ไฟล์</span>
            </div>
            <div class="p-5 bg-amber-50/40 dark:bg-slate-800/80 grid grid-cols-1 md:grid-cols-2 gap-3">{{attachmentsHtml}}</div>
        </div>
    </template>

    <template id="tpl-sop-attach-img">
        <div onclick="sop_openLightbox('{{url}}')" class="block group rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm hover:shadow-lg transition overflow-hidden bg-white dark:bg-slate-900 relative cursor-zoom-in">
            <img src="{{url}}" class="w-full h-48 object-cover transition duration-300 group-hover:scale-105">
            <div class="absolute top-2 right-2 bg-black/60 text-white text-[10px] font-bold px-2 py-1 rounded-md backdrop-blur-sm flex items-center gap-1"><span class="material-icons text-[12px]">zoom_in</span>คลิกเพื่อขยาย</div>
        </div>
    </template>

    <template id="tpl-sop-attach-pdf">
        <div onclick="window.open('{{url}}', '_blank')" class="bg-gradient-to-br from-red-50 to-white dark:from-slate-800 dark:to-slate-900 rounded-xl shadow-sm border border-red-200 dark:border-red-900/50 p-4 flex items-center gap-3 cursor-pointer hover:shadow-md hover:border-red-400 transition group">
            <div class="w-12 h-12 bg-red-100 dark:bg-red-900/50 rounded-xl flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform shadow-inner">
                <span class="material-icons text-2xl text-red-500">picture_as_pdf</span>
            </div>
            <div class="flex-1 min-w-0">
                <h4 class="text-sm font-black text-slate-800 dark:text-white group-hover:text-red-500 transition truncate">{{name}}</h4>
                <p class="text-[10px] font-bold text-gray-500 mt-0.5">คลิกเพื่อเปิดอ่าน</p>
            </div>
            <span class="material-icons text-red-500 group-hover:translate-x-1 transition">open_in_new</span>
        </div>
    </template>

    <!-- BLOCK: ประวัติแก้ไข -->
    <template id="tpl-sop-history">
        <details class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-md overflow-hidden group">
            <summary class="cursor-pointer bg-gradient-to-r from-purple-500 to-violet-500 px-5 py-3 flex items-center gap-2 list-none">
                <div class="bg-white/20 p-1.5 rounded-lg"><span class="material-icons text-white text-[18px]">history</span></div>
                <h3 class="text-white font-black text-sm tracking-wide">ประวัติการแก้ไข</h3>
                <span class="ml-auto bg-white/20 text-white text-[10px] font-black px-2 py-0.5 rounded-full backdrop-blur-sm">{{count}} ครั้ง</span>
                <span class="material-icons text-white group-open:rotate-180 transition text-[18px]">expand_more</span>
            </summary>
            <div class="p-5 space-y-2 text-xs bg-purple-50/40 dark:bg-slate-800/80">{{historyItemsHtml}}</div>
        </details>
    </template>

    <template id="tpl-sop-history-item">
        <div class="bg-slate-50 dark:bg-slate-900/50 p-3 rounded-lg border border-gray-200 dark:border-slate-700 flex items-start gap-2">
            <span class="material-icons text-[14px] text-purple-500 mt-0.5">edit_note</span>
            <div class="flex-1">
                <div class="font-bold text-slate-700 dark:text-gray-200">{{editor}}</div>
                <div class="text-gray-500 dark:text-gray-400 text-[11px]">{{dateStr}}</div>
            </div>
        </div>
    </template>

    <template id="tpl-sop-empty">
        <div class="text-center text-gray-400 dark:text-gray-600 mt-[15vh] flex flex-col items-center select-none p-8">
            <span class="material-icons text-[100px] mb-6 opacity-30">menu_book</span>
            <h2 class="text-2xl font-black text-gray-500">เลือกกฎเพื่อเริ่มอ่าน</h2>
            <p class="text-sm mt-2 font-bold">คลิกที่รายการด้านซ้ายมือเพื่อเปิดดูเนื้อหา</p>
        </div>
    </template>

    <template id="tpl-sop-no-rules">
        <div class="text-center text-gray-400 dark:text-gray-600 py-10 flex flex-col items-center select-none bg-gray-100 dark:bg-slate-900/50 rounded-xl border border-gray-200 dark:border-slate-700 border-dashed">
            <span class="material-icons text-[60px] mb-3 opacity-30">post_add</span>
            <p class="text-sm font-bold">{{hint}}</p>
        </div>
    </template>

    <template id="tpl-sop-manage-cat">
        <div class="text-left mt-4">
            <div class="flex gap-2 mb-4">
                <input type="text" id="newSopCatName" placeholder="พิมพ์ชื่อหมวดหมู่ใหม่..." class="flex-1 bg-slate-50 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white rounded-xl p-3 text-sm outline-none focus:border-rose-500 shadow-inner font-bold">
                <button onclick="sop_addCategory()" class="bg-rose-600 hover:bg-rose-500 text-white px-4 py-3 rounded-xl font-bold shadow-md transition active:scale-95 flex items-center gap-1 border border-rose-500"><span class="material-icons text-sm">add</span> เพิ่ม</button>
            </div>
            <div class="text-[10px] text-gray-500 dark:text-gray-400 font-bold uppercase tracking-widest mb-2 border-b border-gray-200 dark:border-slate-700 pb-1">หมวดหมู่ที่มีอยู่</div>
            <div id="sopCatListContainer" class="max-h-[40vh] overflow-y-auto custom-scrollbar pr-2 pb-2">
                {{catListHtml}}
            </div>
        </div>
    </template>

    <template id="tpl-sop-manage-cat-item">
        <div class="flex justify-between items-center p-3 bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl mb-2 shadow-sm">
            <span class="text-slate-800 dark:text-white font-bold text-sm">{{catName}}</span>
            <button onclick="sop_deleteCategory({{index}})" class="text-red-400 hover:text-white bg-white dark:bg-slate-800 hover:bg-red-500 px-2 py-1.5 rounded-lg transition shadow-sm border border-gray-200 dark:border-slate-700" title="ลบหมวดหมู่"><span class="material-icons text-[16px]">delete</span></button>
        </div>
    </template>
</div>

<!-- 🖼️ Lightbox -->
<div id="sopLightbox" class="hidden fixed inset-0 z-[9999] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 fade-in" onclick="sop_closeLightbox(event)">
    <button onclick="sop_closeLightbox()" class="absolute top-4 right-4 bg-white/10 hover:bg-red-500 text-white w-12 h-12 rounded-full flex items-center justify-center transition border border-white/20 backdrop-blur-sm shadow-lg z-10" title="ปิด">
        <span class="material-icons text-2xl">close</span>
    </button>
    <button id="sopLightboxPrev" onclick="event.stopPropagation(); sop_lightboxNav(-1)" class="hidden absolute left-4 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-white/30 text-white w-12 h-12 rounded-full items-center justify-center transition border border-white/20 backdrop-blur-sm shadow-lg z-10" title="ก่อนหน้า">
        <span class="material-icons text-2xl">chevron_left</span>
    </button>
    <button id="sopLightboxNext" onclick="event.stopPropagation(); sop_lightboxNav(1)" class="hidden absolute right-4 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-white/30 text-white w-12 h-12 rounded-full items-center justify-center transition border border-white/20 backdrop-blur-sm shadow-lg z-10" title="ถัดไป">
        <span class="material-icons text-2xl">chevron_right</span>
    </button>
    <div class="max-w-[95vw] max-h-[95vh] flex items-center justify-center" onclick="event.stopPropagation()">
        <img id="sopLightboxImg" src="" class="max-w-full max-h-[95vh] object-contain rounded-xl shadow-2xl" alt="">
    </div>
    <div id="sopLightboxCounter" class="hidden absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/60 text-white text-sm font-bold px-4 py-2 rounded-full backdrop-blur-sm border border-white/20"></div>
</div>
