<div id="uwfApp" class="fade-in flex flex-col h-full bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-10">
    <div class="bg-gradient-to-r from-cyan-600 to-blue-600 text-white p-4 shadow-md shrink-0 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-xl shadow-inner">
                <span class="material-icons text-3xl">ac_unit</span>
            </div>
            <div>
                <h1 class="font-black text-xl tracking-wide">ระบบแช่แข็งคอมพิวเตอร์ (UWF)</h1>
                <p class="text-xs text-cyan-100 opacity-90">จัดการแช่แข็งฮาร์ดดิสก์ และสั่งรีสตาร์ทเครื่องพนักงาน</p>
            </div>
        </div>
        <button onclick="showPage('dashboard')" class="bg-black/30 hover:bg-black/50 text-white px-4 py-2 rounded-xl font-bold transition flex items-center gap-2 shadow-sm border border-white/20 backdrop-blur-sm">
            <span class="material-icons text-sm">arrow_back</span> กลับเมนูหลัก
        </button>
    </div>

    <div class="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 flex flex-wrap gap-4 items-center justify-between shadow-sm z-10 shrink-0">
        <div class="relative flex-1 md:w-64 max-w-sm">
            <span class="material-icons absolute left-3 top-2.5 text-gray-400 text-[18px]">search</span>
            <input type="text" id="uwfSearchInput" onkeyup="renderUwfGrid()" placeholder="ค้นหาชื่อเครื่องคอมพิวเตอร์..." class="w-full pl-9 pr-3 py-2 bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white rounded-xl text-sm outline-none focus:border-cyan-500 focus:ring-1 transition">
        </div>
        <div class="flex gap-2">
            <button onclick="fetchUwfComputers()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 shadow transition">
                <span class="material-icons text-sm">refresh</span> รีเฟรชข้อมูล
            </button>
            <button onclick="bulkUnlockUwf()" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 shadow-lg transition transform active:scale-95 border border-red-400">
                <span class="material-icons text-sm">lock_open</span> ปลดล็อคทั้งหมด (อัปเดตแพทช์)
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50 custom-scrollbar">
        <div id="uwfGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5 max-w-[1600px] mx-auto pb-10">
            </div>
    </div>
</div>
