<!-- ==========================================
     🌐 หน้าตรวจสอบ IP + FP พนักงาน V3
     ========================================== -->
<div class="p-4 md:p-6 max-w-[1600px] mx-auto">

    <!-- Header -->
    <div class="bg-gradient-to-r from-sky-600 to-cyan-500 text-white rounded-2xl p-5 mb-5 shadow-lg flex items-center justify-between flex-wrap gap-3">
        <div class="flex items-center gap-3">
            <span class="material-icons text-4xl">public</span>
            <div>
                <h1 class="text-xl md:text-2xl font-black">ตรวจสอบ IP &amp; FP พนักงาน</h1>
                <p class="text-xs md:text-sm opacity-90">ตรวจจับการแชร์บัญชี / VPN / IP เปลี่ยนกลางคัน / สลับเครื่อง</p>
            </div>
        </div>
        <div class="flex gap-2 flex-wrap">
            <button onclick="exportIpLogsCSV()" class="bg-white/20 hover:bg-white/30 backdrop-blur-sm px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1 transition">
                <span class="material-icons text-base">download</span> Export CSV
            </button>
            <button onclick="cleanOldIpLogs()" class="bg-white/20 hover:bg-white/30 backdrop-blur-sm px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1 transition">
                <span class="material-icons text-base">cleaning_services</span> ลบ Log เก่า
            </button>
        </div>
    </div>

    <!-- การ์ดสรุป 6 ใบ -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-5">
        <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow border-l-4 border-sky-500">
            <div class="text-xs text-gray-500 dark:text-gray-400 font-bold">รายการทั้งหมด</div>
            <div id="ipStatTotal" class="text-2xl md:text-3xl font-black text-sky-600 dark:text-sky-400 mt-1">0</div>
        </div>
        <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow border-l-4 border-emerald-500">
            <div class="text-xs text-gray-500 dark:text-gray-400 font-bold">พนักงานที่เข้าระบบ</div>
            <div id="ipStatUsers" class="text-2xl md:text-3xl font-black text-emerald-600 dark:text-emerald-400 mt-1">0</div>
        </div>
        <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow border-l-4 border-purple-500">
            <div class="text-xs text-gray-500 dark:text-gray-400 font-bold">จำนวน IP ทั้งหมด</div>
            <div id="ipStatIps" class="text-2xl md:text-3xl font-black text-purple-600 dark:text-purple-400 mt-1">0</div>
        </div>
        <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow border-l-4 border-indigo-500">
            <div class="text-xs text-gray-500 dark:text-gray-400 font-bold">จำนวน FP (อุปกรณ์)</div>
            <div id="ipStatFps" class="text-2xl md:text-3xl font-black text-indigo-600 dark:text-indigo-400 mt-1">0</div>
        </div>
        <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow border-l-4 border-rose-500">
            <div class="text-xs text-gray-500 dark:text-gray-400 font-bold">⚠ IP เปลี่ยนกลางคัน</div>
            <div id="ipStatChanges" class="text-2xl md:text-3xl font-black text-rose-600 dark:text-rose-400 mt-1">0</div>
        </div>
        <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow border-l-4 border-fuchsia-500">
            <div class="text-xs text-gray-500 dark:text-gray-400 font-bold">🚨 FP เปลี่ยนกลางคัน</div>
            <div id="ipStatFpChanges" class="text-2xl md:text-3xl font-black text-fuchsia-600 dark:text-fuchsia-400 mt-1">0</div>
        </div>
    </div>

    <!-- Tabs + Search -->
    <div class="bg-white dark:bg-slate-800 rounded-xl shadow p-3 mb-4 flex flex-wrap items-center justify-between gap-3">
        <div class="flex gap-2 flex-wrap">
            <button id="ipTab_all" onclick="switchIpTab('all')" class="ip-tab-btn bg-sky-600 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1 transition">
                <span class="material-icons text-base">list</span> ประวัติทั้งหมด
            </button>
            <button id="ipTab_changes" onclick="switchIpTab('changes')" class="ip-tab-btn bg-white dark:bg-slate-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-slate-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1 transition hover:bg-rose-50">
                <span class="material-icons text-base">swap_horiz</span> 🚨 IP เปลี่ยน
            </button>
            <button id="ipTab_fp_changes" onclick="switchIpTab('fp_changes')" class="ip-tab-btn bg-white dark:bg-slate-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-slate-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1 transition hover:bg-fuchsia-50">
                <span class="material-icons text-base">devices</span> 🚨 FP เปลี่ยน
            </button>
            <button id="ipTab_duplicates" onclick="switchIpTab('duplicates')" class="ip-tab-btn bg-white dark:bg-slate-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-slate-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1 transition hover:bg-amber-50">
                <span class="material-icons text-base">warning</span> ⚠ IP ซ้ำ
            </button>
            <button id="ipTab_fp_duplicates" onclick="switchIpTab('fp_duplicates')" class="ip-tab-btn bg-white dark:bg-slate-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-slate-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1 transition hover:bg-orange-50">
                <span class="material-icons text-base">device_hub</span> ⚠ FP ซ้ำ
            </button>
            <button id="ipTab_by_user" onclick="switchIpTab('by_user')" class="ip-tab-btn bg-white dark:bg-slate-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-slate-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1 transition hover:bg-emerald-50">
                <span class="material-icons text-base">groups</span> สรุปต่อพนักงาน
            </button>
        </div>

        <div class="flex gap-2 items-center flex-wrap">
            <select id="ipUserFilter" onchange="filterIpLogs()" class="bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-800 dark:text-white">
                <option value="all">-- ดูทั้งหมด --</option>
            </select>
            <div class="relative">
                <span class="material-icons absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 text-base">search</span>
                <input id="ipSearchInput" oninput="filterIpLogs(); if(currentIpTab==='all') renderIpView();" type="text" placeholder="ค้นหา ชื่อ / IP / FP / ประเทศ..." class="pl-8 pr-3 py-2 border border-gray-300 dark:border-slate-600 dark:bg-slate-700 rounded-lg text-sm text-slate-800 dark:text-white w-56">
            </div>
            <button onclick="fetchIpLogs()" class="bg-sky-500 hover:bg-sky-600 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1 transition" title="รีเฟรชข้อมูล">
                <span class="material-icons text-base">refresh</span>
            </button>
        </div>
    </div>

    <!-- พื้นที่แสดงข้อมูล -->
    <div id="ipLogsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
        <div class="col-span-full text-center py-10">
            <span class="material-icons animate-spin text-sky-500 text-4xl">sync</span>
            <p class="text-gray-400 mt-2 font-bold">กำลังโหลดข้อมูล IP &amp; FP...</p>
        </div>
    </div>
</div>

<!-- 🛡️ Safety Check: ตรวจว่าไฟล์ ip_check.js โหลดสำเร็จไหม -->
<script>
(function() {
    // รอ 2 วินาทีหลัง DOM พร้อม แล้วเช็คว่าฟังก์ชันมีอยู่จริงไหม
    setTimeout(function() {
        if (typeof window.fetchIpLogs !== 'function' || typeof window.switchIpTab !== 'function') {
            const container = document.getElementById('ipLogsContainer');
            if (container && !window._ipCheckErrorShown) {
                window._ipCheckErrorShown = true;
                container.innerHTML = `
                    <div class="col-span-full bg-rose-50 dark:bg-rose-900/20 border-2 border-rose-300 dark:border-rose-700 rounded-2xl p-6 text-center">
                        <span class="material-icons text-6xl text-rose-500 mb-3">error_outline</span>
                        <h3 class="font-black text-lg text-rose-700 dark:text-rose-300 mb-2">ไฟล์ระบบโหลดไม่สำเร็จ</h3>
                        <p class="text-sm text-rose-600 dark:text-rose-400 mb-4">
                            ไฟล์ <code class="bg-rose-100 dark:bg-rose-900/50 px-2 py-0.5 rounded font-mono text-xs">js/ip_check.js</code> 
                            ไม่ได้ถูกโหลดเข้าระบบ
                        </p>
                        <div class="bg-white dark:bg-slate-800 rounded-xl p-4 text-left text-xs text-gray-600 dark:text-gray-300 max-w-lg mx-auto">
                            <div class="font-black text-sky-600 dark:text-sky-400 mb-2">วิธีแก้:</div>
                            <ol class="list-decimal ml-5 space-y-1">
                                <li>กด <b>Ctrl + Shift + R</b> (รีเฟรชหนัก) เพื่อล้าง cache</li>
                                <li>ถ้ายังไม่ได้ — ตรวจสอบใน Cloudflare Pages ว่าไฟล์ <code>js/ip_check.js</code> ถูกอัปโหลดขึ้นไหม</li>
                                <li>ลองเข้า URL <code>/js/ip_check.js</code> ตรงๆ → ถ้าเห็นโค้ด = ไฟล์มี / ถ้าเห็น 404 = ต้องอัปไฟล์ใหม่</li>
                                <li>ตรวจสอบ encoding ไฟล์ต้องเป็น <b>UTF-8</b> (ไม่ใช่ ANSI / Windows-874)</li>
                            </ol>
                        </div>
                        <button onclick="location.reload()" class="mt-4 bg-sky-500 hover:bg-sky-600 text-white px-5 py-2 rounded-lg text-sm font-bold">
                            <span class="material-icons text-sm align-middle">refresh</span> ลองรีโหลดอีกครั้ง
                        </button>
                    </div>`;
            }
        }
    }, 2000);
})();
</script>

</div>
