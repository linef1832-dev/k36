<div id="galleryApp" class="fade-in flex flex-col h-full bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-0">
    <div class="bg-gray-800 text-white p-4 shrink-0 border-b border-gray-600">
        <div class="flex justify-between items-center mb-4 border-b border-gray-600 pb-3 gap-4">
            <div class="flex gap-2 flex-1 max-w-3xl flex-wrap">
                <button id="tabGeneral" onclick="switchGalleryMode('general')" class="flex-1 min-w-[110px] py-2 rounded-lg font-bold text-sm transition bg-blue-600 text-white shadow-lg border border-blue-400 transform scale-105">🖼️ รูปทั่วไป</button>
                <button id="tabBonus" onclick="switchGalleryMode('bonus')" class="flex-1 min-w-[110px] py-2 rounded-lg font-bold text-sm transition bg-slate-700 text-gray-400 hover:text-white border border-transparent">🎁 โบนัสไทม์</button>
                <button id="tabReach" onclick="switchGalleryMode('reach')" class="flex-1 min-w-[110px] py-2 rounded-lg font-bold text-sm transition bg-slate-700 text-gray-400 hover:text-white border border-transparent">📣 รีชเมนู</button>
                <button id="tabCard" onclick="switchGalleryMode('card')" class="flex-1 min-w-[110px] py-2 rounded-lg font-bold text-sm transition bg-slate-700 text-gray-400 hover:text-white border border-transparent">🃏 การ์ดเมนู</button>
                <button id="tabLogo" onclick="switchGalleryMode('logo')" class="hidden flex-1 min-w-[110px] py-2 rounded-lg font-bold text-sm transition bg-slate-700 text-gray-400 hover:text-white border border-transparent">🏷️ LOGO</button>
            </div>
            <button onclick="showPage('dashboard')" class="bg-black/30 hover:bg-black/50 text-white px-4 py-2 rounded-xl font-bold transition flex items-center gap-2 shadow-sm border border-white/20 backdrop-blur-sm shrink-0">
                <span class="material-icons text-sm">arrow_back</span> กลับเมนูหลัก
            </button>
        </div>
        
        <div class="flex flex-col xl:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 w-full xl:w-auto">
                <h2 class="text-xl font-bold flex items-center gap-2 text-pink-400 whitespace-nowrap"><span class="material-icons">photo_library</span> คลังรูป</h2>
                <select id="galleryFilter" onchange="syncUploadCategory(); fetchGalleryImages()" class="bg-gray-700 text-white text-sm p-2 rounded border border-gray-600 outline-none cursor-pointer font-bold">
                    <option value="all">-- ทุกเว็บ --</option>
                </select>
                <select id="gallerySort" onchange="fetchGalleryImages()" class="bg-gray-700 text-white text-sm p-2 rounded border border-gray-600 outline-none cursor-pointer font-bold">
                    <option value="newest">🕐 ใหม่สุด</option>
                    <option value="oldest">🕐 เก่าสุด</option>
                    <option value="name_asc">🔤 ชื่อ A-Z</option>
                    <option value="name_desc">🔤 ชื่อ Z-A</option>
                </select>
            </div>
            <div class="relative w-full xl:w-1/3">
                <span class="material-icons absolute left-2 top-2 text-gray-400">search</span>
                <input type="text" id="gallerySearch" onkeyup="filterGalleryImages()" placeholder="พิมพ์ชื่อรูปเพื่อค้นหา..." class="w-full bg-gray-700 text-white pl-9 pr-2 py-1.5 rounded-lg border border-gray-600 focus:border-pink-500 outline-none transition">
            </div>
            <div class="flex flex-wrap items-center gap-2 w-full xl:w-auto justify-end">
                <button id="btnBulkDelete" onclick="deleteSelectedImages()" class="hidden bg-red-600 hover:bg-red-500 text-white px-3 py-1.5 rounded-lg font-bold text-sm flex items-center gap-1 shadow-lg border border-red-400 animate-pulse"><span class="material-icons text-sm">delete_sweep</span> ลบที่เลือก (<span id="selectedCount">0</span>)</button>
                <button onclick="downloadAllInFilter()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-lg font-bold text-sm flex items-center gap-1 shadow-lg transition whitespace-nowrap border border-blue-400"><span class="material-icons text-sm">download_for_offline</span> โหลดทั้งหมด</button>
                <div id="adminUploadControls" class="flex items-center gap-2 hidden pl-2 border-l border-gray-600">
                    <select id="uploadCategory" class="bg-white text-slate-900 text-sm p-1.5 rounded font-bold border border-pink-300 outline-none max-w-[120px]"><option value="ทั่วไป">ทั่วไป</option></select>
                    <label class="cursor-pointer bg-pink-600 hover:bg-pink-500 text-white px-3 py-1.5 rounded-lg font-bold text-sm transition flex items-center gap-1 shadow whitespace-nowrap border border-pink-400">
                        <span class="material-icons text-sm">cloud_upload</span> อัปโหลด
                        <input type="file" id="imageInput" accept="image/*" multiple class="hidden" onchange="handleImageUpload(this)">
                    </label>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Drag & Drop Zone -->
    <div id="galleryDropZone" class="hidden mx-4 mt-2 border-2 border-dashed border-pink-400 rounded-xl p-4 text-center text-pink-300 font-bold text-sm bg-pink-900/20 select-none">
        <span class="material-icons text-3xl mb-1 block">cloud_upload</span>
        ลากรูปมาวางที่นี่เพื่ออัปโหลด
    </div>
    <!-- Badge count per web -->
    <div id="galleryWebBadges" class="px-4 py-2 flex flex-wrap gap-1.5 border-b border-gray-700 min-h-[36px]"></div>
    <div id="galleryGrid" class="flex-1 overflow-y-auto p-4 bg-slate-100 dark:bg-slate-900 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 content-start custom-scrollbar auto-rows-min"></div>
    
    <div class="bg-gray-800 text-gray-400 text-xs p-3 text-center border-t border-gray-600 flex justify-between px-4 mt-auto shrink-0">
        <div class="flex items-center gap-3">
            <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" onchange="toggleSelectAllImages(this)" class="w-4 h-4 rounded cursor-pointer"> เลือกทั้งหมดในหน้านี้</label>
            <select id="galleryPerPage" onchange="fetchGalleryImages()" class="bg-gray-700 text-white text-xs px-2 py-1 rounded border border-gray-600 outline-none cursor-pointer font-bold">
                <option value="20">20 รูป/หน้า</option>
                <option value="50" selected>50 รูป/หน้า</option>
                <option value="100">100 รูป/หน้า</option>
                <option value="999">ทั้งหมด</option>
            </select>
        </div>
        <div id="galleryPagination" class="flex items-center gap-1"></div>
        <div>พบรูปภาพทั้งหมด: <span id="galleryCount" class="text-white font-bold text-sm">0</span> รูป</div>
    </div>
</div>

<!-- Lightbox -->
<div id="galleryLightbox" class="hidden fixed inset-0 z-[9999] bg-black/90 flex items-center justify-center" onclick="closeLightbox()">
    <button onclick="event.stopPropagation();moveLightbox(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/40 text-white rounded-full w-12 h-12 flex items-center justify-center text-2xl font-bold transition z-10">&#8249;</button>
    <div class="flex flex-col items-center max-w-[90vw] max-h-[90vh]" onclick="event.stopPropagation()">
        <img id="lightboxImg" src="" class="max-w-[85vw] max-h-[80vh] object-contain rounded-xl shadow-2xl">
        <div class="mt-3 flex items-center gap-3 flex-wrap justify-center">
            <span id="lightboxName" class="text-white font-bold text-sm"></span>
            <span id="lightboxCounter" class="text-gray-400 text-xs"></span>
            <span id="lightboxDate" class="text-gray-500 text-xs"></span>
            <button onclick="event.stopPropagation(); _copyLightboxUrl()" class="bg-violet-600 hover:bg-violet-500 text-white px-3 py-1 rounded-lg text-xs font-bold flex items-center gap-1 transition"><span class="material-icons text-sm">link</span>Copy URL</button>
            <button id="lightboxRename" onclick="event.stopPropagation(); _renameLightboxImg()" class="hidden bg-amber-600 hover:bg-amber-500 text-white px-3 py-1 rounded-lg text-xs font-bold flex items-center gap-1 transition"><span class="material-icons text-sm">edit</span>แก้ชื่อ</button>
            <a id="lightboxDownload" href="" download class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded-lg text-xs font-bold flex items-center gap-1 transition"><span class="material-icons text-sm">download</span>โหลด</a>
        </div>
    </div>
    <button onclick="event.stopPropagation();moveLightbox(1)" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/40 text-white rounded-full w-12 h-12 flex items-center justify-center text-2xl font-bold transition z-10">&#8250;</button>
    <button onclick="closeLightbox()" class="absolute top-4 right-4 bg-white/20 hover:bg-white/40 text-white rounded-full w-10 h-10 flex items-center justify-center text-xl font-bold transition">✕</button>
</div>

<div id="galleryTemplates" style="display: none;">
    <template id="tpl-gallery-card">
        <div class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700 shadow-lg flex flex-col group relative hover:border-pink-500 transition-all h-full shrink-0">
            <div class="h-56 w-full bg-black relative flex items-center justify-center cursor-zoom-in overflow-hidden shrink-0" data-lb-index="{{lbIndex}}" onclick="openLightbox(parseInt(this.dataset.lbIndex))">
                {{newBadge}}
                {{adminCheckbox}}
                {{catBadge}}
                <img src="{{url}}" class="w-full h-full object-contain transition duration-300 group-hover:scale-105" loading="lazy">
                <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition flex flex-col items-center justify-center pointer-events-none">
                    <span class="material-icons text-white text-4xl opacity-0 group-hover:opacity-80 transition">zoom_in</span>
                    <span class="text-white text-[10px] font-bold opacity-0 group-hover:opacity-90 transition mt-1 bg-black/50 px-2 py-0.5 rounded">{{uploadDate}}</span>
                    <span class="text-gray-300 text-[9px] opacity-0 group-hover:opacity-80 transition bg-black/50 px-2 py-0.5 rounded mt-0.5">{{uploadBy}}</span>
                </div>
            </div>
            <div class="p-2 bg-slate-900 border-t border-slate-700 flex flex-col gap-2 mt-auto">
                <div class="text-white font-bold text-xs truncate text-center" title="{{name}}">{{name}}</div>
                <div class="mt-1 flex gap-2 w-full">
                    <button onclick="event.stopPropagation(); copyImageToClipboard('{{url}}')" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white text-[10px] py-2 rounded-lg shadow font-bold flex items-center justify-center gap-1 transition active:scale-95 border border-blue-500">
                        <span class="material-icons text-xs">content_copy</span> คัดลอก
                    </button>
                    <button onclick="event.stopPropagation(); downloadGalleryUrl('{{url}}', '{{name}}')" class="flex-1 bg-green-600 hover:bg-green-500 text-white text-[10px] py-2 rounded-lg shadow font-bold flex items-center justify-center gap-1 transition active:scale-95 border border-green-500">
                        <span class="material-icons text-xs">download</span> โหลด
                    </button>
                </div>
            </div>
        </div>
    </template>
</div>
