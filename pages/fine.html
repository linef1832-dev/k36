<div class="fade-in flex flex-col h-full bg-slate-100 dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-10">
    <div class="bg-gradient-to-r from-red-800 to-rose-900 text-white p-4 shadow-lg shrink-0 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-xl shadow-inner"><span class="material-icons text-3xl text-red-200">gavel</span></div>
            <div>
                <h1 class="font-black text-xl tracking-wide">ระบบใบปรับพนักงาน (Fines)</h1>
                <p class="text-xs text-red-200 opacity-90" id="fineSubtitle">ตรวจสอบรายการใบปรับของคุณ</p>
            </div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50 custom-scrollbar">
        <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 pb-10">
            
            <div id="fineAdminControls" class="hidden lg:col-span-4 flex flex-col gap-6">
                <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-lg border border-slate-200 dark:border-slate-700">
                    <div class="flex justify-between items-center border-b border-slate-200 dark:border-slate-700 pb-3 mb-4">
                        <h2 class="text-lg font-black text-red-500 flex items-center gap-2"><span class="material-icons">post_add</span> ออกใบปรับใหม่</h2>
                        <button onclick="openManageFineRulesModal()" class="text-xs bg-slate-700 hover:bg-slate-600 text-white px-2 py-1 rounded shadow transition">จัดการหัวข้อกฎ</button>
                    </div>
                    
                    <form onsubmit="submitFine(event)" class="space-y-4">
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 dark:text-gray-400 uppercase mb-1">พนักงานที่ทำผิด</label>
                            <select id="fineEmpSelect" required class="w-full p-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white font-bold outline-none focus:border-red-500 shadow-inner"></select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 dark:text-gray-400 uppercase mb-1">หัวข้อกฎ</label>
                            <select id="fineRuleSelect" required class="w-full p-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white font-bold outline-none focus:border-red-500 shadow-inner">
                                <option value="">-- โหลดข้อมูลกฎ --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 dark:text-gray-400 uppercase mb-1">จำนวนเงินปรับ (ถ้ามี)</label>
                            <input type="number" id="fineAmount" placeholder="ใส่ตัวเลข เช่น 300" class="w-full p-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white font-bold outline-none focus:border-red-500 shadow-inner">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 dark:text-gray-400 uppercase mb-1 text-red-500">📸 แนบรูปหลักฐาน (ถ้ามี)</label>
                            <input type="file" id="fineImageInput" accept="image/*" class="w-full p-2 border border-slate-600 rounded-xl bg-slate-900 text-white focus:ring-2 focus:ring-red-500 outline-none text-xs shadow-inner file:mr-3 file:py-1 file:px-2 file:rounded file:border-0 file:text-[10px] file:font-bold file:bg-red-600 file:text-white hover:file:bg-red-500 cursor-pointer" onchange="previewFineImg(this)">
                            <div id="fineImgPreviewBox" class="hidden mt-2 relative inline-block bg-slate-900 p-2 rounded-xl border border-slate-700">
                                <img id="fineImgPreview" src="" class="h-24 w-auto object-cover rounded-lg border border-slate-600 shadow-md">
                                <button type="button" onclick="clearFineImg()" class="absolute -top-2 -right-2 bg-slate-500 text-white rounded-full w-5 h-5 flex items-center justify-center shadow-md hover:bg-slate-600 transition"><span class="material-icons text-[12px]">close</span></button>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-red-600 hover:bg-red-500 text-white font-black py-3 rounded-xl shadow-lg transition active:scale-95 flex items-center justify-center gap-1 border border-red-500">
                            <span class="material-icons text-sm">send</span> ยืนยันการออกใบปรับ
                        </button>
                    </form>
                </div>
            </div>

            <div id="fineTableContainer" class="lg:col-span-8 bg-white dark:bg-slate-800 rounded-2xl shadow-lg border border-slate-200 dark:border-slate-700 flex flex-col h-[600px] overflow-hidden">
                <div class="p-4 border-b border-gray-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-between items-center">
                    <h3 class="font-bold text-slate-800 dark:text-white flex items-center gap-2" id="tableFineTitle">
                        <span class="material-icons text-blue-500">list_alt</span> รายการใบปรับของฉัน
                    </h3>
                    <div class="relative w-48">
                        <span class="material-icons absolute left-2 top-1.5 text-gray-400 text-sm">search</span>
                        <input type="text" id="fineSearchInput" onkeyup="renderFineTable()" placeholder="ค้นหาชื่อ, กฎ..." class="w-full pl-7 pr-2 py-1.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-white text-xs outline-none focus:border-red-500 shadow-inner">
                    </div>
                </div>
                <div class="flex-1 overflow-auto custom-scrollbar">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-slate-100 dark:bg-slate-900 text-gray-500 dark:text-gray-400 text-xs uppercase sticky top-0 shadow-sm z-10">
                            <tr>
                                <th class="p-3 font-bold">วันที่ออกใบปรับ</th>
                                <th class="p-3 font-bold" id="thEmpName">ชื่อพนักงาน</th>
                                <th class="p-3 font-bold">หัวข้อที่ผิด</th>
                                <th class="p-3 font-bold text-center">ค่าปรับ</th>
                                <th class="p-3 font-bold text-center">หลักฐาน</th>
                                <th class="p-3 font-bold text-center" id="thAction">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="fineTableBody" class="divide-y divide-gray-100 dark:divide-slate-700 text-slate-700 dark:text-gray-200">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="fineImageModal" class="fixed inset-0 bg-black/90 z-[100] hidden items-center justify-center p-4 fade-in backdrop-blur-sm" onclick="this.classList.add('hidden'); this.classList.remove('flex');">
    <span class="absolute top-4 right-4 text-white hover:text-gray-300 cursor-pointer material-icons text-4xl">close</span>
    <img id="fineExpandedImg" class="max-w-full max-h-[90vh] object-contain rounded-xl shadow-2xl border border-slate-700" onclick="event.stopPropagation()">
</div>

<div id="fineRulesModal" class="fixed inset-0 bg-black/70 z-[100] hidden items-center justify-center p-4 fade-in backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border border-slate-600">
        <div class="bg-slate-900 p-4 border-b border-slate-700 flex justify-between items-center">
            <h3 class="font-bold text-white flex items-center gap-2"><span class="material-icons text-amber-500">settings</span> จัดการหัวข้อกฎ</h3>
            <button onclick="document.getElementById('fineRulesModal').classList.add('hidden'); document.getElementById('fineRulesModal').classList.remove('flex');" class="text-gray-400 hover:text-white"><span class="material-icons">close</span></button>
        </div>
        <div class="p-5">
            <div class="flex gap-2 mb-4">
                <input type="text" id="newRuleInput" placeholder="เพิ่มหัวข้อกฎใหม่..." class="flex-1 p-2 rounded-lg bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white text-sm outline-none focus:border-amber-500">
                <button onclick="addFineRule()" class="bg-amber-600 hover:bg-amber-500 text-white px-3 py-2 rounded-lg text-sm font-bold shadow transition">เพิ่ม</button>
            </div>
            <div class="text-xs text-gray-500 mb-2">หัวข้อกฎที่มีในระบบ:</div>
            <div id="fineRulesList" class="max-h-60 overflow-y-auto custom-scrollbar space-y-2 bg-slate-50 dark:bg-slate-900/50 p-2 rounded-xl border border-slate-200 dark:border-slate-700"></div>
        </div>
    </div>
</div>
