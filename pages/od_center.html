<div id="odCenterApp" class="fade-in flex flex-col h-full bg-slate-100 dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-10">

    <!-- 🟦 Header -->
    <div class="bg-gradient-to-r from-blue-600 via-cyan-600 to-teal-600 text-white p-5 shadow-lg shrink-0 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2.5 rounded-2xl shadow-inner backdrop-blur-sm border border-white/20"><span class="material-icons text-3xl">link</span></div>
            <div>
                <h1 class="font-black text-xl md:text-2xl tracking-wide drop-shadow-sm">OD Center</h1>
                <p class="text-xs text-blue-100 opacity-90 mt-0.5">ตรวจสอบลิงก์เว็บ — ครบจบในที่เดียว</p>
            </div>
        </div>
        <button onclick="showPage('dashboard')" class="bg-black/30 hover:bg-black/50 text-white px-4 py-2 rounded-xl font-bold transition flex items-center gap-2 shadow-sm border border-white/20 backdrop-blur-sm">
            <span class="material-icons text-sm">arrow_back</span> กลับเมนูหลัก
        </button>
    </div>

    <!-- Toolbar -->
    <div class="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 shadow-sm shrink-0">
        <div class="flex flex-wrap gap-2.5 items-center">
            <button onclick="odc_runAllChecks()" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 shadow-lg transition transform active:scale-95 border border-blue-400">
                <span class="material-icons text-sm">refresh</span> ตรวจอัตโนมัติทั้งหมด
            </button>

            <div class="flex-1"></div>

            <button onclick="odc_buildReport()" class="bg-purple-600 hover:bg-purple-500 text-white px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1 shadow transition border border-purple-500">
                <span class="material-icons text-sm">description</span> สร้างรายงาน
            </button>

            <button onclick="odc_sendTelegram()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1 shadow transition border border-cyan-500">
                <span class="material-icons text-sm">send</span> ส่ง Telegram
            </button>

            <div id="odcAdminControls" class="hidden flex gap-2">
                <button onclick="odc_manageWebsites()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1 shadow transition border border-slate-500">
                    <span class="material-icons text-sm">settings</span> จัดการเว็บ
                </button>
                <button onclick="odc_viewHistory()" class="bg-amber-600 hover:bg-amber-500 text-white px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1 shadow transition border border-amber-500">
                    <span class="material-icons text-sm">history</span> ประวัติ
                </button>
            </div>
        </div>

        <!-- Status bar -->
        <div class="mt-3 flex items-center gap-3 text-xs flex-wrap" id="odcStatusBar">
            <span class="bg-slate-100 dark:bg-slate-900 px-3 py-1.5 rounded-lg font-bold text-slate-700 dark:text-gray-300 flex items-center gap-1 border border-gray-200 dark:border-slate-700">
                <span class="material-icons text-[14px] text-blue-500">schedule</span>
                <span id="odcLastCheck">ยังไม่เคยตรวจ</span>
            </span>
            <span class="bg-emerald-100 dark:bg-emerald-900/40 px-3 py-1.5 rounded-lg font-bold text-emerald-700 dark:text-emerald-300 flex items-center gap-1 border border-emerald-200 dark:border-emerald-700">
                <span class="material-icons text-[14px]">check_circle</span>
                ปกติ: <span id="odcOkCount">0</span>
            </span>
            <span class="bg-red-100 dark:bg-red-900/40 px-3 py-1.5 rounded-lg font-bold text-red-700 dark:text-red-300 flex items-center gap-1 border border-red-200 dark:border-red-700">
                <span class="material-icons text-[14px]">error</span>
                มีปัญหา: <span id="odcErrCount">0</span>
            </span>
            <span class="bg-amber-100 dark:bg-amber-900/40 px-3 py-1.5 rounded-lg font-bold text-amber-700 dark:text-amber-300 flex items-center gap-1 border border-amber-200 dark:border-amber-700">
                <span class="material-icons text-[14px]">person</span>
                ผู้ตรวจ: <span id="odcAssignedTo">-</span>
            </span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-y-auto custom-scrollbar p-4 sm:p-6">
        <div id="odcWebsitesContainer" class="max-w-5xl mx-auto space-y-4">
            <!-- websites render here -->
            <div class="text-center text-gray-400 py-20">
                <span class="material-icons text-5xl animate-spin opacity-30">sync</span>
                <p class="mt-3 font-bold">กำลังโหลด...</p>
            </div>
        </div>
    </div>
</div>

<!-- Template: Website Card -->
<template id="tpl-odc-website">
    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-md overflow-hidden">
        <div class="text-white px-5 py-3 flex items-center gap-3 flex-wrap" style="background: linear-gradient(to right, {{webColor}}, {{webColorLight}});">
            <span class="text-2xl shrink-0">{{webEmoji}}</span>
            <h3 class="font-black text-lg tracking-wide flex-1">{{webName}}</h3>
            <span class="bg-white/20 text-white text-xs font-black px-3 py-1 rounded-full">{{statusBadge}}</span>
        </div>
        <div class="p-4 space-y-2">
            {{linksHtml}}
        </div>
    </div>
</template>

<!-- Template: Link Item -->
<template id="tpl-odc-link">
    <div class="flex items-center gap-3 p-3 rounded-xl border-l-4 {{statusBorderClass}} bg-slate-50 dark:bg-slate-900 hover:bg-slate-100 dark:hover:bg-slate-700/50 transition">
        <span class="material-icons text-[22px] {{statusIconClass}}">{{statusIcon}}</span>
        <div class="flex-1 min-w-0">
            <div class="font-bold text-slate-800 dark:text-white text-sm">{{linkLabel}}</div>
            <div class="text-[10px] text-gray-500 dark:text-gray-400 truncate font-mono">{{linkUrl}}</div>
            {{statusDetail}}
        </div>
        <div class="flex items-center gap-1 shrink-0 flex-wrap justify-end">
            {{actionsHtml}}
        </div>
    </div>
</template>
