<div class="fade-in flex flex-col h-full bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-10">
   <div class="bg-sky-600 text-white p-4 shadow-md shrink-0 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-full"><span class="material-icons text-3xl">telegram</span></div>
            <div>
                <h1 class="font-bold text-xl">ศูนย์รวมกลุ่มงาน (Telegram Hub)</h1>
                <p class="text-xs text-sky-100 opacity-80">รวมลิงก์กลุ่มประสานงาน แยกตามเว็บ</p>
            </div>
        </div>
        <button onclick="showPage('dashboard')" class="bg-black/20 hover:bg-black/40 text-white px-4 py-2 rounded-lg font-bold transition flex items-center gap-2 shadow-sm border border-white/20 backdrop-blur-sm shrink-0">
            <span class="material-icons text-sm">arrow_back</span> กลับเมนูหลัก
        </button>
    </div>

    <div class="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 flex flex-wrap gap-4 items-center justify-between shadow-sm z-10">
        <div class="flex items-center gap-2 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
            <span class="material-icons text-sky-500">filter_alt</span>
            <span class="font-bold text-slate-600 dark:text-gray-300 whitespace-nowrap">เลือกเว็บ:</span>
            <div id="teleFilterContainer" class="flex gap-2"></div>
        </div>
        <!-- Search Bar -->
        <div class="relative w-full md:w-64">
            <span class="material-icons absolute left-2.5 top-2.5 text-gray-400 text-[18px]">search</span>
            <input type="text" id="teleSearch" onkeyup="renderTeleGrid()" placeholder="ค้นหาชื่อกลุ่ม..." class="w-full pl-8 pr-3 py-2 text-sm font-bold bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-xl outline-none focus:border-sky-500 transition dark:text-white">
        </div>
        <!-- Status Filter -->
        <select id="teleStatusFilter" onchange="renderTeleGrid()" class="text-sm font-bold bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-white rounded-xl px-3 py-2 outline-none focus:border-sky-500 transition cursor-pointer">
            <option value="all">📋 ทุกสถานะ</option>
            <option value="active">🟢 Active</option>
            <option value="paused">🟡 ปิดชั่วคราว</option>
            <option value="archived">⚫ เก็บถาวร</option>
        </select>
        <div id="teleAdminControls" class="hidden flex gap-2 w-full md:w-auto justify-end">
            <button onclick="openAddTeleModal()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1 shadow transition transform active:scale-95">
                <span class="material-icons text-sm">add_circle</span> เพิ่มกลุ่มใหม่
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50 custom-scrollbar">
        <div id="teleGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 max-w-7xl mx-auto pb-10"></div>
    </div>
</div>

<div id="teleModal" class="fixed inset-0 bg-black/70 z-[100] hidden flex items-center justify-center p-4 fade-in backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden border border-slate-200 dark:border-slate-700">
        <div class="bg-gradient-to-r from-sky-600 to-blue-600 p-4 flex justify-between items-center text-white">
            <h3 id="teleModalTitle" class="font-bold text-lg flex items-center gap-2"><span class="material-icons">add_link</span> เพิ่มลิงก์ใหม่</h3>
            <button type="button" onclick="closeTeleModal()" class="text-white/80 hover:text-white p-1 rounded-full bg-white/10 hover:bg-white/20 transition"><span class="material-icons text-sm block">close</span></button>
        </div>
        <form onsubmit="saveTeleLink(event)" class="p-6 space-y-4 text-left">
            <input type="hidden" id="teleId">
            <div>
                <label class="block text-[11px] font-bold text-slate-500 dark:text-gray-400 mb-1 uppercase tracking-wider">ชื่อกลุ่ม / คำอธิบาย</label>
                <input type="text" id="teleName" required placeholder="เช่น กลุ่มหลัก, กลุ่มแจ้งโอน..." class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-sky-500 outline-none text-sm shadow-inner transition">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 dark:text-gray-400 mb-1 uppercase tracking-wider">ลิงก์กลุ่ม (URL)</label>
                <input type="text" id="teleUrl" required placeholder="https://t.me/..." class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-sky-500 outline-none font-mono text-sm shadow-inner transition">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 dark:text-gray-400 mb-1 uppercase tracking-wider">หมวดหมู่เว็บ</label>
                    <select id="teleCategory" required class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-sky-500 outline-none text-sm cursor-pointer shadow-inner transition">
                        </select>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 dark:text-gray-400 mb-1 uppercase tracking-wider">สีไอคอน</label>
                    <select id="teleColor" class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-sky-500 outline-none text-sm cursor-pointer shadow-inner transition">
                        <option value="blue">🔵 ฟ้า (Blue)</option>
                        <option value="green">🟢 เขียว (Green)</option>
                        <option value="red">🔴 แดง (Red)</option>
                        <option value="orange">🟠 ส้ม (Orange)</option>
                        <option value="purple">🟣 ม่วง (Purple)</option>
                        <option value="gray">⚪ เทา (Gray)</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 dark:text-gray-400 mb-1 uppercase tracking-wider">สถานะกลุ่ม</label>
                <select id="teleStatus" class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-sky-500 outline-none text-sm cursor-pointer shadow-inner transition">
                    <option value="active">🟢 Active — ใช้งานปกติ</option>
                    <option value="paused">🟡 ปิดชั่วคราว</option>
                    <option value="archived">⚫ เก็บถาวร</option>
                </select>
            </div>
            <button type="submit" id="teleSubmitBtn" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-3.5 rounded-xl shadow-lg mt-4 transition transform active:scale-95 border border-sky-400 flex items-center justify-center gap-2 text-base">
                บันทึกข้อมูล
            </button>
        </form>
    </div>
</div>

<div id="teleTemplates" class="hidden">
    <template id="tpl-tele-card">
        <div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-slate-200 dark:border-slate-700 hover:shadow-md transition relative group">
            {{adminBtns}}
            <div class="flex items-start gap-4">
                <div class="w-12 h-12 rounded-full {{colorClass}} flex items-center justify-center shrink-0"><span class="material-icons text-2xl">near_me</span></div>
                <div class="flex-1 min-w-0 pr-10">
                    <div class="flex items-center gap-2 mb-0.5">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">{{category}}</span>
                        {{statusBadge}}
                    </div>
                    <h4 class="font-bold text-slate-800 dark:text-white truncate text-base mb-1" title="{{name}}">{{name}}</h4>
                    <div class="flex gap-2 mt-3">
                        <a href="{{url}}" target="_blank" class="flex-1 bg-sky-50 text-sky-700 hover:bg-sky-100 dark:bg-sky-900/30 dark:text-sky-300 py-1.5 rounded-lg text-xs font-bold text-center transition">เข้าร่วม</a>
                        <button onclick="copyToClip('{{url}}')" class="px-3 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-xs font-bold transition" title="คัดลอกลิงก์"><span class="material-icons text-sm pt-1">content_copy</span></button>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>
