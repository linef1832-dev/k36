<div class="fade-in flex flex-col h-full bg-slate-100 dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-10">
    <div class="bg-gradient-to-r from-yellow-600 to-orange-600 text-white p-4 shadow-lg shrink-0 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-xl shadow-inner"><span class="material-icons text-3xl">campaign</span></div>
            <div>
                <h1 class="font-black text-xl tracking-wide">กระดานประกาศ (Announcement)</h1>
                <p class="text-xs text-yellow-100 opacity-90">แจ้งข่าวสารสำคัญให้พนักงานทุกคนรับทราบ</p>
            </div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50 custom-scrollbar flex justify-center">
        <div class="w-full max-w-4xl space-y-6">
            
            <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 md:p-8 shadow-xl border border-slate-200 dark:border-slate-700 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-yellow-400 to-orange-500"></div>
                <h2 class="text-xl font-black text-slate-800 dark:text-white flex items-center gap-2 mb-6 border-b border-gray-100 dark:border-slate-700 pb-4">
                    <span class="material-icons text-orange-500">push_pin</span> ประกาศที่กำลังแสดงอยู่
                </h2>
                <div id="currentAnnouncementDisplay" class="text-center py-10">
                    <span class="material-icons animate-spin text-4xl text-gray-300">sync</span>
                </div>
            </div>

            <div id="adminAnnouncementControls" class="hidden bg-slate-800 rounded-3xl p-6 md:p-8 shadow-xl border border-slate-700 relative">
                <h2 class="text-lg font-black text-yellow-400 flex items-center gap-2 mb-6 border-b border-slate-700 pb-4">
                    <span class="material-icons">edit_note</span> สร้าง/แก้ไข ประกาศ
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">หัวข้อประกาศ (พาดหัว)</label>
                        <input type="text" id="announceTitle" placeholder="เช่น: แจ้งวันหยุดสงกรานต์, อัปเดตระบบใหม่..." class="w-full p-3 rounded-xl bg-slate-900 border border-slate-600 text-white font-bold outline-none focus:border-yellow-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">รายละเอียด</label>
                        <textarea id="announceText" rows="4" placeholder="พิมพ์เนื้อหาประกาศที่นี่..." class="w-full p-3 rounded-xl bg-slate-900 border border-slate-600 text-white text-sm outline-none focus:border-yellow-500 transition custom-scrollbar"></textarea>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">รูปภาพประกอบ (อัปโหลดจากอุปกรณ์)</label>
                        <input type="file" id="announceImageFile" accept="image/*" class="w-full p-2 border border-slate-600 rounded-xl bg-slate-900 text-white focus:ring-2 focus:ring-yellow-500 outline-none text-sm transition shadow-inner file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-[11px] file:font-bold file:bg-yellow-600 file:text-white hover:file:bg-yellow-500 cursor-pointer" onchange="previewAnnounceImg(this)">
                        <input type="hidden" id="announceImageUrl" value="">
                        <div id="announceImgPreviewBox" class="hidden mt-3 relative inline-block bg-slate-900 p-2 rounded-xl border border-slate-700">
                            <span class="text-[10px] text-gray-500 block mb-1 font-bold">รูปปัจจุบัน:</span>
                            <img id="announceImgPreview" src="" class="h-28 w-auto object-cover rounded-lg border border-slate-600 shadow-md">
                            <button onclick="clearAnnounceImg()" class="absolute top-2 right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center shadow-md hover:bg-red-600 transition"><span class="material-icons text-[12px]">close</span></button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4 bg-slate-900/50 p-3 rounded-xl border border-slate-600/50">
                        <div>
                            <label class="block text-[10px] font-bold text-yellow-500 mb-1 flex items-center gap-1"><span class="material-icons text-[14px]">schedule</span> เวลาเริ่มแสดงผล (ไม่บังคับ)</label>
                            <input type="datetime-local" id="announceScheduleTime" class="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-600 text-white text-xs outline-none focus:border-yellow-500 transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-red-400 mb-1 flex items-center gap-1"><span class="material-icons text-[14px]">timer_off</span> เวลาสิ้นสุด/ซ่อนอัตโนมัติ (ไม่บังคับ)</label>
                            <input type="datetime-local" id="announceEndTime" class="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-600 text-white text-xs outline-none focus:border-yellow-500 transition">
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between bg-slate-900 p-4 rounded-xl border border-slate-600 mt-4">
                        <div>
                            <div class="text-sm font-bold text-white">สถานะการแสดงผล</div>
                            <div class="text-[10px] text-gray-400">ถ้าเปิดไว้ พนักงานทุกคนจะเห็นป๊อปอัปเด้งแจ้งเตือน</div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="announceIsActive" class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                        </label>
                    </div>

                    <div class="flex gap-2 mt-4">
                        <button onclick="saveAnnouncement()" class="flex-1 bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-400 hover:to-orange-400 text-white font-black py-3 rounded-xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2 text-lg border border-orange-400">
                            <span class="material-icons">send</span> บันทึกและกระจาย
                        </button>
                        <button onclick="deleteAnnouncement()" class="bg-red-600 hover:bg-red-500 text-white font-black px-5 py-3 rounded-xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-1 border border-red-400" title="ลบประกาศนี้ทิ้ง">
                            <span class="material-icons">delete_sweep</span> ลบประกาศ
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
