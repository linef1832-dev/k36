<div id="kbApp" class="fade-in flex flex-col h-full bg-slate-100 dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-10">
    <div class="bg-gradient-to-r from-amber-600 to-yellow-600 text-white p-4 shadow-lg shrink-0 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-xl shadow-inner"><span class="material-icons text-3xl">menu_book</span></div>
            <div>
                <h1 class="font-black text-xl tracking-wide">คลังความรู้ (Knowledge Base)</h1>
                <p class="text-xs text-amber-100 opacity-90">ศูนย์รวมคู่มือ กฎระเบียบ และวิธีแก้ปัญหา</p>
            </div>
        </div>
        <button onclick="showPage('dashboard')" class="bg-black/30 hover:bg-black/50 text-white px-4 py-2 rounded-xl font-bold transition flex items-center gap-2 shadow-sm border border-white/20 backdrop-blur-sm">
            <span class="material-icons text-sm">arrow_back</span> กลับเมนูหลัก
        </button>
    </div>

    <div class="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 flex flex-wrap gap-4 items-center justify-between shadow-sm z-10 shrink-0">
        <div class="flex items-center gap-3 w-full md:w-auto">
            <div class="relative flex-1 md:w-64">
                <span class="material-icons absolute left-3 top-2.5 text-gray-400 text-[18px]">search</span>
                <input type="text" id="kbSearch" onkeyup="kb_renderList()" placeholder="ค้นหาบทความ, คู่มือ..." class="w-full pl-9 pr-3 py-2 bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white rounded-xl text-sm outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition shadow-inner">
            </div>
            <select id="kbCategory" onchange="kb_renderList()" class="bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white px-3 py-2 rounded-xl outline-none focus:border-amber-500 font-bold text-sm shadow-inner cursor-pointer">
                <option value="ALL">📂 ทุกหมวดหมู่</option>
                <option value="คู่มือการทำงาน">📘 คู่มือการทำงาน</option>
                <option value="สคริปต์ตอบแชท">💬 สคริปต์ตอบแชท</option>
                <option value="กฎระเบียบ">⚖️ กฎระเบียบ</option>
                <option value="ไอทีและระบบ">💻 ไอทีและระบบ</option>
            </select>
        </div>
        <div id="kbAdminControls" class="hidden w-full md:w-auto flex justify-end">
            <button onclick="kb_openAddModal()" class="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 shadow-lg transition transform active:scale-95 border border-amber-400">
                <span class="material-icons text-sm">add_circle</span> เขียนบทความใหม่
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-hidden p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50">
        <div class="max-w-[1600px] mx-auto h-full grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4 bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-lg p-5 flex flex-col h-full overflow-hidden">
                <h3 class="text-slate-800 dark:text-white font-black mb-4 flex items-center gap-2 border-b border-gray-200 dark:border-slate-700 pb-3 text-lg"><span class="material-icons text-amber-500">library_books</span> สารบัญ</h3>
                <div id="kbListContainer" class="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-2 content-start">
                    <div class="text-center text-gray-500 py-10"><span class="material-icons animate-spin">sync</span> กำลังโหลด...</div>
                </div>
            </div>

            <div class="lg:col-span-8 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl p-6 md:p-8 flex flex-col h-full overflow-y-auto custom-scrollbar relative group">
                <div id="kbReaderContent" class="max-w-4xl w-full mx-auto relative">
                    <div class="text-center text-gray-400 dark:text-gray-600 mt-[15vh] flex flex-col items-center select-none">
                        <span class="material-icons text-[100px] mb-6 opacity-30 group-hover:opacity-50 transition">chrome_reader_mode</span>
                        <h2 class="text-2xl font-black text-gray-500">เลือกบทความเพื่อเริ่มอ่าน</h2>
                        <p class="text-sm mt-2 font-bold">คลิกที่รายการด้านซ้ายมือเพื่อเปิดดูเนื้อหา</p>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</div>
