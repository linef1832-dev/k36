<div id="kbApp" class="fade-in flex flex-col h-full bg-slate-100 dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden pb-10">
    <div class="bg-gradient-to-r from-amber-600 to-yellow-600 text-white p-4 shadow-lg shrink-0 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-xl shadow-inner"><span class="material-icons text-3xl">menu_book</span></div>
            <div>
                <h1 class="font-black text-xl tracking-wide">คลังความรู้ (Knowledge Base)</h1>
                <p class="text-xs text-amber-100 opacity-90">ศูนย์รวมคู่มือ กฎระเบียบ และวิธีแก้ปัญหา</p>
            </div>
        </div>
        <button onclick="showPage('dashboard')" class="bg-black/30 hover:bg-black/50 text-white px-4 py-2 rounded-xl font-bold transition flex items-center gap-2 shadow-sm border border-white/20 backdrop-blur-sm">
            <span class="material-icons text-sm">arrow_back</span> กลับเมนูหลัก
        </button>
    </div>

    <div class="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 flex flex-wrap gap-4 items-center justify-between shadow-sm z-10 shrink-0">
        <div class="flex items-center gap-3 w-full md:w-auto">
            <div class="relative flex-1 md:w-64">
                <span class="material-icons absolute left-3 top-2.5 text-gray-400 text-[18px]">search</span>
                <input type="text" id="kbSearch" onkeyup="kb_renderList()" placeholder="ค้นหาบทความ..." class="w-full pl-9 pr-3 py-2 bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white rounded-xl text-sm outline-none focus:border-amber-500 transition shadow-inner">
            </div>
            <select id="kbCategory" onchange="kb_renderList()" class="bg-slate-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white px-3 py-2 rounded-xl outline-none focus:border-amber-500 font-bold text-sm cursor-pointer shadow-inner">
                <option value="ALL">📂 ทุกหมวดหมู่</option>
            </select>
        </div>
        <div id="kbAdminControls" class="hidden w-full md:w-auto flex justify-end gap-2">
            <button onclick="kb_manageCategories()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1 shadow transition border border-slate-500">
                <span class="material-icons text-sm">category</span> จัดการหมวดหมู่
            </button>
            <button onclick="kb_openAddModal()" class="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 shadow-lg transition transform active:scale-95 border border-amber-400">
                <span class="material-icons text-sm">add_circle</span> เขียนบทความใหม่
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-hidden p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50">
        <div class="max-w-[1600px] mx-auto h-full grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-lg p-5 flex flex-col h-full overflow-hidden">
                <h3 class="text-slate-800 dark:text-white font-black mb-4 flex items-center gap-2 border-b pb-3 text-lg"><span class="material-icons text-amber-500">library_books</span> สารบัญ</h3>
                <div id="kbListContainer" class="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-2"></div>
            </div>
            <div class="lg:col-span-8 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl p-6 md:p-8 flex flex-col h-full overflow-y-auto custom-scrollbar">
                <div id="kbReaderContent" class="max-w-4xl w-full mx-auto"></div>
            </div>
        </div>
    </div>
</div>

<div id="kb-templates" class="hidden">
    
    <template id="tpl-kb-list-item">
        <div onclick="kb_readArticle('{{id}}')" class="cursor-pointer p-3.5 rounded-xl border {{activeBg}} transition flex gap-3 group shadow-sm">
            <div class="mt-1 shrink-0"><span class="material-icons {{iconColor}} text-[22px] bg-white dark:bg-slate-800 p-2 rounded-lg shadow-sm border border-gray-100 dark:border-slate-600 group-hover:scale-110 transition">{{icon}}</span></div>
            <div class="flex-1 min-w-0">
                <h4 class="text-slate-800 dark:text-white font-bold text-sm truncate group-hover:text-amber-600 dark:group-hover:text-amber-400 transition">{{title}}</h4>
                <div class="flex items-center gap-2 mt-1.5 text-[10px] font-bold text-gray-500">
                    <span class="bg-white dark:bg-slate-800 px-2 py-0.5 rounded-md border border-gray-200 dark:border-slate-600 shadow-sm flex items-center gap-1">{{displayCat}} {{fileBadge}}</span>
                    <span class="flex items-center gap-0.5"><span class="material-icons text-[12px]">calendar_today</span> {{date}}</span>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-kb-read">
        <div class="fade-in">
            <div class="flex justify-between items-start mb-6 pb-6 border-b border-gray-200 dark:border-slate-700">
                <div>
                    <span class="bg-amber-100 dark:bg-amber-900/50 text-amber-700 dark:text-amber-400 px-3 py-1 rounded-full text-[11px] font-black border border-amber-200 dark:border-amber-500/50 shadow-sm mb-3 inline-block">{{displayCat}}</span>
                    <h1 class="text-2xl md:text-3xl font-black text-slate-800 dark:text-white leading-tight">{{title}}</h1>
                    <div class="flex items-center gap-4 mt-4 text-xs font-bold text-gray-500 dark:text-gray-400">
                        <span class="flex items-center gap-1 bg-slate-100 dark:bg-slate-800 px-2.5 py-1 rounded-md border border-gray-200 dark:border-slate-700"><span class="material-icons text-[14px]">edit_document</span> ผู้เขียน: {{author_name}}</span>
                        <span class="flex items-center gap-1 bg-slate-100 dark:bg-slate-800 px-2.5 py-1 rounded-md border border-gray-200 dark:border-slate-700"><span class="material-icons text-[14px]">schedule</span> อัปเดต: {{dateStr}}</span>
                    </div>
                </div>
                {{deleteBtn}}
            </div>
            <div class="text-slate-700 dark:text-gray-300 text-sm md:text-base leading-relaxed space-y-4 whitespace-pre-wrap font-medium">{{formattedContent}}</div>
            <div class="mt-6 pt-6 border-t border-gray-200 dark:border-slate-700 flex flex-col gap-6">
                {{mediaHtml}}
            </div>
            <div class="h-10"></div>
        </div>
    </template>

    <template id="tpl-kb-empty">
        <div class="text-center text-gray-400 dark:text-gray-600 mt-[15vh] flex flex-col items-center select-none">
            <span class="material-icons text-[100px] mb-6 opacity-30 group-hover:opacity-50 transition">chrome_reader_mode</span>
            <h2 class="text-2xl font-black text-gray-500">เลือกบทความเพื่อเริ่มอ่าน</h2>
            <p class="text-sm mt-2 font-bold">คลิกที่รายการด้านซ้ายมือเพื่อเปิดดูเนื้อหา</p>
        </div>
    </template>

    <template id="tpl-kb-media-pdf">
        <div class="flex flex-col w-full items-center">
            <div onclick="window.open('{{url}}', '_blank')" class="w-full bg-gradient-to-br from-red-50 to-white dark:from-slate-800 dark:to-slate-900 rounded-2xl shadow-sm border border-red-200 dark:border-red-900/50 p-5 flex flex-col sm:flex-row items-center justify-between gap-4 cursor-pointer hover:shadow-md hover:border-red-400 transition group">
                <div class="flex items-center gap-4 w-full sm:w-auto">
                    <div class="w-14 h-14 bg-red-100 dark:bg-red-900/50 rounded-2xl flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform shadow-inner">
                        <span class="material-icons text-3xl text-red-500">picture_as_pdf</span>
                    </div>
                    <div class="flex-1">
                        <h4 class="text-base font-black text-slate-800 dark:text-white group-hover:text-red-500 transition">เอกสารประกอบ (PDF)</h4>
                        <p class="text-[11px] font-bold text-gray-500 mt-0.5">คลิกเพื่อเปิดอ่านแบบเต็มหน้าจอ</p>
                    </div>
                </div>
                <button class="w-full sm:w-auto bg-red-500 hover:bg-red-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center justify-center gap-1.5 shadow-md transition active:scale-95 shrink-0 text-sm">
                    <span class="material-icons text-[16px]">open_in_new</span> เปิดอ่านไฟล์
                </button>
            </div>
            {{captionHtml}}
        </div>
    </template>

    <template id="tpl-kb-media-img">
        <div class="flex flex-col items-center w-full">
            <a href="{{url}}" target="_blank" class="block group relative rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm hover:shadow-lg transition overflow-hidden bg-white dark:bg-slate-900 w-fit max-w-full">
                <img src="{{url}}" class="max-h-96 w-auto object-contain transition duration-300 group-hover:scale-105 cursor-zoom-in max-w-full">
            </a>
            {{captionHtml}}
        </div>
    </template>
    
    <template id="tpl-kb-caption">
        <div class="text-left md:text-center text-sm font-bold text-gray-500 mt-2 bg-slate-50 dark:bg-slate-900/50 px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm w-fit max-w-full break-words mx-auto whitespace-pre-line">{{caption}}</div>
    </template>

    <template id="tpl-kb-preview-pdf">
        <div class="relative flex items-start gap-3 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-600 rounded-lg shadow-sm p-2 w-full">
            <div class="flex items-center justify-center h-16 w-16 shrink-0 bg-red-50 dark:bg-red-900/20 rounded-md border border-red-100 dark:border-red-900/50">
                <span class="material-icons text-red-500 text-3xl">picture_as_pdf</span>
            </div>
            <div class="flex-1 flex flex-col justify-center min-w-0">
                <span class="text-[10px] font-bold text-gray-400 truncate mb-1">{{fileName}}</span>
                <textarea id="kb-img-cap-{{index}}" rows="2" placeholder="พิมพ์คำอธิบายใต้ไฟล์นี้... (ขึ้นบรรทัดใหม่ได้)" class="w-full p-2 text-xs bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded outline-none focus:border-sky-500 text-slate-800 dark:text-white shadow-inner custom-scrollbar resize-none"></textarea>
            </div>
        </div>
    </template>

    <template id="tpl-kb-preview-img">
        <div class="relative flex items-start gap-3 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-600 rounded-lg shadow-sm p-2 w-full">
            <div class="shrink-0">
                <img id="kb-preview-img-{{index}}" src="" class="h-16 w-16 object-cover rounded-md shadow-sm border border-gray-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-900">
            </div>
            <div class="flex-1 flex flex-col justify-center min-w-0">
                <span class="text-[10px] font-bold text-gray-400 truncate mb-1">{{fileName}}</span>
                <textarea id="kb-img-cap-{{index}}" rows="2" placeholder="พิมพ์คำอธิบายใต้รูปนี้... (ขึ้นบรรทัดใหม่ได้)" class="w-full p-2 text-xs bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded outline-none focus:border-sky-500 text-slate-800 dark:text-white shadow-inner custom-scrollbar resize-none"></textarea>
            </div>
        </div>
    </template>

    <template id="tpl-kb-preview-img">
        <div class="relative flex items-start gap-3 bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-600 rounded-lg shadow-sm p-2 w-full">
            <div class="shrink-0">
                <img id="kb-preview-img-{{index}}" src="" class="h-16 w-16 object-cover rounded-md shadow-sm border border-gray-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-900">
            </div>
            <div class="flex-1 flex flex-col justify-center min-w-0">
                <span class="text-[10px] font-bold text-gray-400 truncate mb-1">{{fileName}}</span>
                <input type="text" id="kb-img-cap-{{index}}" placeholder="พิมพ์คำอธิบายใต้รูปนี้..." class="w-full p-2 text-xs bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded outline-none focus:border-sky-500 text-slate-800 dark:text-white shadow-inner">
            </div>
        </div>
    </template>

    <template id="tpl-kb-manage-cat">
        <div class="text-left mt-4">
            <div class="flex gap-2 mb-4">
                <input type="text" id="newKbCatName" placeholder="พิมพ์ชื่อหมวดหมู่ใหม่ (เช่น 💡 ไอเดียใหม่)..." class="flex-1 bg-slate-50 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 text-slate-800 dark:text-white rounded-xl p-3 text-sm outline-none focus:border-amber-500 shadow-inner font-bold">
                <button onclick="kb_addCategory()" class="bg-amber-600 hover:bg-amber-500 text-white px-4 py-3 rounded-xl font-bold shadow-md transition active:scale-95 flex items-center gap-1 border border-amber-500"><span class="material-icons text-sm">add</span> เพิ่ม</button>
            </div>
            <div class="text-[10px] text-gray-500 dark:text-gray-400 font-bold uppercase tracking-widest mb-2 border-b border-gray-200 dark:border-slate-700 pb-1">หมวดหมู่ที่มีอยู่</div>
            <div id="kbCatListContainer" class="max-h-[40vh] overflow-y-auto custom-scrollbar pr-2 pb-2">
                {{catListHtml}}
            </div>
        </div>
    </template>
    
    <template id="tpl-kb-manage-cat-item">
        <div class="flex justify-between items-center p-3 bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl mb-2 shadow-sm">
            <span class="text-slate-800 dark:text-white font-bold text-sm">{{catName}}</span>
            <button onclick="kb_deleteCategory({{index}})" class="text-red-400 hover:text-white bg-white dark:bg-slate-800 hover:bg-red-500 px-2 py-1.5 rounded-lg transition shadow-sm border border-gray-200 dark:border-slate-700" title="ลบหมวดหมู่"><span class="material-icons text-[16px]">delete</span></button>
        </div>
    </template>
</div>
